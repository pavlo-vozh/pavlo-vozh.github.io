<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Imposter Game</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    animation: { 'pulse-fast': 'pulse-fast 0.5s ease-in-out infinite' },
                    keyframes: { 'pulse-fast': { '0%, 100%': { transform: 'scale(1)', opacity: '1' }, '50%': { transform: 'scale(1.05)', opacity: '0.8' } } }
                }
            }
        }
    </script>

        body { font-family: 'Inter', sans-serif; background-color: #050810; color: #f1f5f9; margin: 0; overflow: hidden; }
        .glass-card { background: rgba(26,31,46,0.6); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(148,163,184,0.3); border-radius: 4px; }
        .screen-container { display: none; animation: fadeIn 0.3s ease-out; height: 100%; flex-direction: column; position: relative; z-index: 10; }
        .screen-container.active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .bg-gradient-overlay { position: absolute; inset: 0; pointer-events: none; z-index: 0; background: linear-gradient(to bottom, rgba(30,58,138,0.1), transparent, rgba(0,0,0,0.6)); }
        .cat-checkbox { appearance: none; -webkit-appearance: none; width: 20px; height: 20px; border: 2px solid #475569; border-radius: 6px; cursor: pointer; transition: all 0.15s; flex-shrink: 0; position: relative; }
        .cat-checkbox:checked { background: #3b82f6; border-color: #3b82f6; }
        .cat-checkbox:checked::after { content: ''; position: absolute; left: 4px; top: 1px; width: 8px; height: 12px; border: 2px solid white; border-top: none; border-left: none; transform: rotate(45deg); }

                </div>
                <h3 class="text-xl sm:text-2xl font-black text-white mb-2 leading-tight">Execute <span id="vote-target-name" class="text-red-400">Player</span>?</h3>
                <p class="text-sm text-slate-300 mb-8 px-2">Make sure you caught the right person...</p>
                <div class="flex space-x-3">
                    <button onclick="closeVoteModal()" class="flex-1 py-3.5 bg-slate-800 hover:bg-slate-700 text-white rounded-xl font-bold transition-colors">Cancel</button>
                    <button id="confirm-vote-btn" class="flex-1 py-3.5 bg-red-600 hover:bg-red-500 text-white rounded-xl font-bold shadow-[0_0_15px_rgba(220,38,38,0.4)] transition-all">Confirm</button>
                </div>
            </div>
        </div>

        <!-- Delete Modal -->
        <div id="delete-modal" class="hidden absolute inset-0 z-50 items-center justify-center p-4 bg-black/80 backdrop-blur-md">
            <div class="glass-card w-full max-w-sm p-6 sm:p-8 rounded-[2rem] text-center shadow-2xl border border-red-500/50">
                <div class="bg-red-500/20 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 border border-red-500/30">
                    <i data-lucide="trash-2" class="text-red-400 w-8 h-8"></i>
                </div>
                <h3 class="text-xl sm:text-2xl font-black text-white mb-2">Delete Category?</h3>
                <p class="text-sm text-slate-300 mb-8 px-2">This action cannot be undone. Are you completely sure?</p>
                <div class="flex space-x-3">
                    <button onclick="closeDeleteModal()" class="flex-1 py-3.5 bg-slate-800 hover:bg-slate-700 text-white rounded-xl font-bold transition-colors">Cancel</button>
                    <button onclick="confirmDeleteCategory()" class="flex-1 py-3.5 bg-red-600 hover:bg-red-500 text-white rounded-xl font-bold shadow-[0_0_15px_rgba(220,38,38,0.4)] transition-all">Delete</button>
                </div>
            </div>
        </div>

        <!-- Winner Modal -->

    const STORAGE_KEY = 'imposterGame_customCategories';

    function loadCategoriesFromStorage() {
        try {
            const stored = localStorage.getItem(STORAGE_KEY);
            if (stored) {
                const parsed = JSON.parse(stored);
                state.customCategories = parsed.map(cat => ({
                    ...cat,
                    id: cat.id || (Date.now() + Math.random())
                }));
            }
        } catch(e) {
            console.error('Failed to load custom categories:', e);
            state.customCategories = [];
        }
    }

    function saveCategoriesToStorage() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state.customCategories));

    const shuffle = arr => {
        const a = [...arr];
        for (let i = a.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
    };

    const getEl = id => document.getElementById(id);
    const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');

    function parseWordToken(token) {
        const match = token.match(/^(.+?)\s*\(([^)]+)\)\s*$/);
        if (match) return { word: match[1].trim(), hint: match[2].trim() };
        return { word: token.trim(), hint: null };
    }

    function render() {
        const root = getEl('app-root');

        switch(state.screen) {
            case 'home':         container.innerHTML = renderHome();         break;
            case 'howToPlay':    container.innerHTML = renderHowToPlay();    break;
            case 'setup':        container.innerHTML = renderSetup();        break;
            case 'categories':   container.innerHTML = renderCategories();   break;
            case 'createCustom': container.innerHTML = renderCreateCustom(); break;
            case 'reveal':       container.innerHTML = renderReveal();       break;
            case 'playing':      container.innerHTML = renderPlaying();      break;
            case 'voting':       container.innerHTML = renderVoting();       break;
            case 'result':       container.innerHTML = renderResult();       break;
            default:             container.innerHTML = renderHome();
        }
        root.innerHTML = '';
        root.appendChild(container);
        updateIcons();
        manageTimer();
    }

                        <div class="flex flex-col space-y-2">
                            <div class="flex items-center space-x-2">
                                <i data-lucide="timer" class="w-4 h-4 text-amber-400"></i>

                            </div>
                            <div class="flex bg-black/30 rounded-xl p-1 border border-slate-700/50">

    // ─── Categories ───────────────────────────────────────────────────────────────
    function renderCategoryCard(cat) {
        const isPro      = cat.type === 'pro';
        const isCustom   = cat.type === 'custom';
        const isSelected = state.selectedCategories.includes(cat.name);

        const bgClass = isSelected
            ? 'bg-blue-600/30 border-blue-400/70 shadow-[0_0_12px_rgba(59,130,246,0.3)]'
            : isPro
                ? 'bg-gradient-to-br from-[#1a1c29] to-[#2d2411] border-amber-500/30'
                : isCustom
                    ? 'bg-gradient-to-br from-[#1c1229] to-[#2d112b] border-fuchsia-500/30'
                    : 'glass-card border-blue-500/20';

        const dotClass = isPro ? 'bg-amber-400' : isCustom ? 'bg-fuchsia-400' : 'bg-blue-400';

        const editBtn = isCustom
            ? `<button data-editid="${cat.id}" onclick="handleEditClick(this, event)" class="p-1.5 bg-fuchsia-500/20 text-fuchsia-300 hover:text-white hover:bg-fuchsia-500/60 rounded-full transition-all z-20">
                   <i data-lucide="pencil" class="w-3.5 h-3.5"></i>
               </button>`
            : '';

        return `
            <div class="relative flex flex-col justify-between p-4 sm:p-5 rounded-2xl aspect-[4/3] text-left overflow-hidden border ${bgClass} transition-all active:scale-95 cursor-pointer"
                 data-catname="${esc(cat.name)}"
                 onclick="handleCategoryClick(this)">
                <div class="absolute top-2 right-2 z-20 pointer-events-none">
                    <input type="checkbox" class="cat-checkbox" ${isSelected ? 'checked' : ''} readonly>
                </div>
                <div class="relative z-10 pr-6">
                    <h3 class="text-white font-bold text-base sm:text-lg leading-tight break-words">${esc(cat.name)}</h3>
                    ${isPro ? `
                        <div class="mt-1 bg-amber-500/20 text-amber-400 text-[10px] font-bold px-1.5 py-0.5 rounded inline-flex items-center space-x-1 border border-amber-500/50">
                            <i data-lucide="sparkles" class="w-3 h-3"></i><span>PRO</span>
                        </div>
                    ` : ''}
                </div>
                <div class="flex items-center justify-between relative z-10 mt-auto pt-2">
                    <div class="flex items-center space-x-2">
                        <div class="w-2 h-2 rounded-full ${dotClass}"></div>
                        <span class="text-slate-300 text-xs font-medium">${cat.words} words</span>
                    </div>
                    ${editBtn}
                </div>
            </div>
        `;
    }

    function renderCategories() {
        const freeCats = Object.keys(WORD_DATABASE)
            .filter(n => !['NFL QBs','Clash Royale','Anime','Superpowers'].includes(n))
            .map(n => ({ name: n, words: WORD_DATABASE[n].length, type: 'free' }));
        const proCats = ['NFL QBs','Clash Royale','Anime','Superpowers']
            .map(n => ({ name: n, words: WORD_DATABASE[n].length, type: 'pro' }));

        const selCount = state.selectedCategories.length;

        return `
            ${topBar('Select Category', true, 'goToSetup')}
            <div class="shrink-0 mb-3 flex items-center justify-between glass-card rounded-2xl px-4 py-3 border border-slate-700/50">
                <span class="text-sm font-semibold ${selCount > 0 ? 'text-blue-300' : 'text-slate-400'}">
                    ${selCount === 0 ? 'Tap categories to select' : `${selCount} selected — random pick`}
                </span>
                ${selCount > 0 ? `<button onclick="clearCategorySelection()" class="text-xs text-slate-400 hover:text-white transition-colors">Clear</button>` : ''}
            </div>
            <div class="flex-1 overflow-y-auto pb-4 pr-1 custom-scrollbar space-y-6">
                <div>
                    <h2 class="text-blue-300 font-bold uppercase tracking-widest text-xs mb-3 px-1">Standard</h2>
                    <div class="grid grid-cols-2 gap-3 sm:gap-4">${freeCats.map(renderCategoryCard).join('')}</div>
                </div>
                <div>
                    <h2 class="text-amber-400/80 font-bold uppercase tracking-widest text-xs mb-3 px-1 flex items-center space-x-1">
                        <i data-lucide="sparkles" class="w-3 h-3"></i><span>Special &amp; Pop Culture</span>
                    </h2>
                    <div class="grid grid-cols-2 gap-3 sm:gap-4">${proCats.map(renderCategoryCard).join('')}</div>
                </div>
                <div>
                    <h2 class="text-fuchsia-400/80 font-bold uppercase tracking-widest text-xs mb-3 px-1">Your Categories</h2>
                    <div class="grid grid-cols-2 gap-3 sm:gap-4">
                        ${state.customCategories.map(renderCategoryCard).join('')}
                        <button onclick="openCreateCustom()" class="relative flex flex-col items-center justify-center p-4 sm:p-5 rounded-2xl aspect-[4/3] transition-all active:scale-95 glass-card border-dashed border-2 border-slate-600 hover:border-blue-400 hover:bg-blue-500/5 group">
                            <div class="bg-slate-800 group-hover:bg-blue-500/20 p-2 sm:p-3 rounded-full mb-2 transition-colors">
                                <i data-lucide="plus" class="w-6 h-6 text-slate-400 group-hover:text-blue-400 transition-colors"></i>
                            </div>
                            <span class="text-slate-300 font-bold text-xs sm:text-sm">Create New</span>
                        </button>
                    </div>
                </div>
            </div>
            <div class="shrink-0 mt-2">
                <button onclick="startGameFromSelection()" ${selCount === 0 ? 'disabled' : ''}
                    class="w-full py-4 rounded-2xl font-bold text-lg transition-all flex justify-center items-center

                        ? 'bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 active:scale-95 text-white shadow-[0_0_20px_rgba(79,70,229,0.3)]'
                        : 'bg-slate-800 text-slate-500 cursor-not-allowed'}">
                    ${selCount > 1 ? '<i data-lucide="shuffle" class="w-5 h-5 mr-2"></i>Play Random Pick' : selCount === 1 ? 'Play Selected' : 'Select a Category'}
                </button>
            </div>
        `;
    }

    // ─── Create / Edit Custom ─────────────────────────────────────────────────────
    function renderCreateCustom() {
        const isEditing = !!state.customForm.id;
        return `
            ${topBar(isEditing ? 'Edit Category' : 'New Category', true, 'goToCategories')}
            <div class="flex-1 overflow-y-auto pb-4 custom-scrollbar">
                <div class="glass-card rounded-3xl p-5 sm:p-6 space-y-6">
                    ${state.customForm.error ? `
                        <div class="bg-red-500/10 border border-red-500/50 p-3 rounded-xl flex items-start space-x-2 text-red-400 text-sm">
                            <i data-lucide="alert-circle" class="w-5 h-5 shrink-0 mt-0.5"></i>

                        </p>
                        <textarea oninput="updateCustomForm('wordsText', this.value)"
                            placeholder="Iron Man (Hero), Thor (God), Hulk (Strong)..."
                            class="w-full h-44 sm:h-52 bg-black/30 border border-slate-700 text-white rounded-xl px-4 py-3 focus:outline-none focus:border-blue-500 transition-all resize-none placeholder:text-slate-600 leading-relaxed custom-scrollbar">${esc(state.customForm.wordsText)}</textarea>
                    </div>
                </div>
            </div>
            <div class="shrink-0 mt-2 space-y-3">
                <button onclick="saveCustomCategory()" class="w-full py-4 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 active:scale-95 text-white rounded-2xl font-bold text-lg shadow-[0_0_20px_rgba(79,70,229,0.3)] flex items-center justify-center space-x-2 transition-all">
                    <i data-lucide="check" class="w-5 h-5"></i><span>Save Category</span>
                </button>
                ${isEditing ? `
                    <button onclick="openDeleteModal()" class="w-full py-3.5 bg-red-500/10 hover:bg-red-500/20 active:scale-95 text-red-400 border border-red-500/30 rounded-2xl font-bold text-base transition-all flex items-center justify-center space-x-2">
                        <i data-lucide="trash-2" class="w-5 h-5"></i><span>Delete Category</span>
                    </button>
                ` : ''}
            </div>
        `;
    }

    // ─── Reveal ───────────────────────────────────────────────────────────────────
    function renderReveal() {
        const currentPlayer = state.players[state.game.currentPlayerIndex];
        const isImposter    = state.game.imposterIds.includes(currentPlayer.id);
        const isJester      = state.game.jesterId === currentPlayer.id;
        const displayName   = currentPlayer.name.trim() || `Player ${state.game.currentPlayerIndex + 1}`;

        let cardContent = '';
        if (!state.game.roleRevealed) {
            cardContent = `
                <button onclick="revealRole()" class="w-full py-12 sm:py-14 bg-black/40 hover:bg-black/60 active:scale-95 rounded-2xl border-2 border-dashed border-slate-600 hover:border-blue-400 flex flex-col items-center justify-center space-y-4 transition-all group shadow-inner">
                    <i data-lucide="eye" class="w-12 h-12 text-slate-500 group-hover:text-blue-400 transition-colors"></i>
                    <span class="text-white font-bold text-lg sm:text-xl tracking-wide">Tap to Reveal Role</span>
                </button>
            `;
        } else if (isJester) {
            cardContent = `
                <div class="p-6 sm:p-8 rounded-3xl border bg-fuchsia-950/60 border-fuchsia-500/40 mb-6">
                    <i data-lucide="smile" class="w-10 h-10 text-fuchsia-400 mx-auto mb-2 animate-pulse"></i>
                    <h3 class="text-xl sm:text-2xl font-black text-fuchsia-400 uppercase tracking-widest">The Jester</h3>
                    <div class="h-px w-16 bg-fuchsia-500/30 mx-auto my-4"></div>
                    <div class="text-lg sm:text-xl font-bold text-white leading-tight">Act suspicious and get voted out to win the round!</div>
                    ${state.settings.imposterHints && state.game.hint ? `
                        <div class="mt-5 bg-fuchsia-500/10 border border-fuchsia-500/20 rounded-xl p-3">
                            <p class="text-[10px] uppercase tracking-widest text-fuchsia-300/80 font-bold mb-0.5">Vague Hint</p>
                            <p class="text-lg font-bold text-white">${esc(state.game.hint)}</p>
                        </div>
                    ` : ''}
                </div>
                <button onclick="nextReveal()" class="w-full py-4 bg-white hover:bg-slate-200 active:scale-95 text-slate-900 rounded-xl font-bold text-lg shadow-xl transition-all">Hide &amp; Next</button>
            `;
        } else if (isImposter) {
            cardContent = `
                <div class="p-6 sm:p-8 rounded-3xl border bg-red-950/60 border-red-500/40 mb-6">
                    <i data-lucide="${state.settings.blindImposter ? 'eye-off' : 'alert-circle'}" class="w-10 h-10 text-red-500 mx-auto mb-2 ${state.settings.blindImposter ? 'animate-pulse' : ''}"></i>
                    <h3 class="text-xl sm:text-2xl font-black text-red-400 uppercase tracking-widest">Imposter</h3>
                    <div class="h-px w-16 bg-red-500/30 mx-auto my-4"></div>
                    ${state.settings.blindImposter
                        ? `<div class="text-lg sm:text-xl font-bold text-white leading-tight">You don't know the category. Survive!</div>`
                        : `<div>
                               <p class="text-red-200/70 text-xs sm:text-sm font-medium">Blend in. The category is:</p>
                               <div class="text-2xl sm:text-3xl font-black text-white mt-2 break-words">${esc(state.game.category)}</div>
                           </div>`
                    }
                    ${state.settings.imposterHints && state.game.hint ? `
                        <div class="mt-5 bg-red-500/10 border border-red-500/20 rounded-xl p-3">
                            <p class="text-[10px] uppercase tracking-widest text-red-300/80 font-bold mb-0.5">Vague Hint</p>
                            <p class="text-lg font-bold text-white">${esc(state.game.hint)}</p>
                        </div>
                    ` : ''}
                </div>
                <button onclick="nextReveal()" class="w-full py-4 bg-white hover:bg-slate-200 active:scale-95 text-slate-900 rounded-xl font-bold text-lg shadow-xl transition-all">Hide &amp; Next</button>
            `;
        } else {
            cardContent = `
                <div class="p-6 sm:p-8 rounded-3xl border bg-blue-950/60 border-blue-500/40 mb-6">
                    <i data-lucide="search" class="w-10 h-10 text-blue-400 mx-auto mb-2"></i>
                    <h3 class="text-base sm:text-lg font-bold text-blue-200/70 uppercase tracking-widest">Secret Word</h3>
                    <div class="h-px w-16 bg-blue-500/30 mx-auto my-4"></div>
                    <div class="text-3xl sm:text-4xl font-black text-white tracking-wide break-words">${esc(state.game.secretWord)}</div>
                </div>
                <button onclick="nextReveal()" class="w-full py-4 bg-white hover:bg-slate-200 active:scale-95 text-slate-900 rounded-xl font-bold text-lg shadow-xl transition-all">Hide &amp; Next</button>
            `;
        }

        return `
            <div class="flex-1 flex flex-col items-center justify-center p-2 sm:p-4">
                <div class="w-full max-w-sm glass-card rounded-[2rem] p-6 sm:p-8 text-center shadow-2xl border border-slate-700/50 overflow-hidden relative">
                    <div class="absolute -top-20 -right-20 w-48 h-48 bg-blue-500 rounded-full blur-[60px] opacity-10 pointer-events-none"></div>
                    <h2 class="text-base sm:text-lg text-blue-200/60 font-semibold mb-2 uppercase tracking-wide">Pass phone to</h2>
                    <h1 class="text-3xl sm:text-4xl font-black text-white mb-8 sm:mb-10 truncate">${esc(displayName)}</h1>
                    ${cardContent}
                </div>
            </div>
        `;
    }

    // ─── Playing ──────────────────────────────────────────────────────────────────
    function renderPlaying() {
        const totalTurns = state.game.shuffledPlayers.length * state.settings.clueRounds;

        if (state.game.activeTurnIndex >= totalTurns) {
            return `
                ${topBar('Give Clues', false)}
                <div class="flex-1 flex flex-col justify-center items-center text-center space-y-6 pb-4">
                    <div class="w-24 h-24 bg-red-500/20 rounded-full flex items-center justify-center border border-red-500/30">
                        <i data-lucide="swords" class="w-12 h-12 text-red-400"></i>
                    </div>
                    <h2 class="text-4xl font-black text-white">All Clues Given</h2>
                    <p class="text-slate-300 px-4 text-lg">It's time to interrogate and vote.</p>
                </div>
                <div class="shrink-0 mt-2">
                    <button onclick="setScreen('voting')" class="w-full py-5 bg-gradient-to-r from-red-600 to-rose-600 hover:from-red-500 hover:to-rose-500 active:scale-95 text-white rounded-2xl font-black text-xl shadow-[0_0_20px_rgba(225,29,72,0.3)] transition-all">Start Voting</button>
                </div>
            `;
        }

        const activePlayer  = state.game.shuffledPlayers[state.game.activeTurnIndex % state.game.shuffledPlayers.length];
        const currentRound  = Math.floor(state.game.activeTurnIndex / state.game.shuffledPlayers.length) + 1;
        const timerOn       = state.settings.timeLimit > 0;
        const timerWarning  = timerOn && state.game.timeLeft <= 3 && state.game.timeLeft > 0;
        const timerFailed   = timerOn && state.game.timeLeft === 0;
        const borderClass   = timerWarning ? 'border-amber-500/50 bg-amber-950/30' : timerFailed ? 'border-red-500/50 bg-red-950/40' : 'border-blue-500/30';
        const nameColor     = timerWarning ? 'text-amber-400' : timerFailed ? 'text-red-400' : 'text-white';

        let timerHTML = '';
        if (timerOn) {
            const tc = timerWarning ? 'border-amber-500/50 text-amber-400 bg-amber-500/10' : timerFailed ? 'border-red-500/50 text-red-500 bg-red-500/10' : 'border-blue-500/30 text-blue-300 bg-black/20';
            timerHTML = `
                <div class="flex flex-col items-center justify-center mb-6">
                    <div id="turn-timer-circle" class="w-24 h-24 rounded-full border-4 flex items-center justify-center shadow-inner transition-colors duration-300 ${tc} ${timerWarning ? 'animate-pulse-fast' : ''}">
                        <span id="turn-timer-text" class="text-4xl font-black font-mono">${state.game.timeLeft}</span>
                    </div>
                    ${timerFailed ? `<span class="text-red-400 font-bold mt-3 text-sm">TIME'S UP!</span>` : ''}
                </div>
            `;
        }

        return `
            ${topBar('Give Clues', false)}
            <div class="flex-1 flex flex-col min-h-0 space-y-4 pb-4">
                ${state.game.activeWildcard ? `
                    <div class="glass-card rounded-2xl p-4 text-center shrink-0 border border-emerald-500/30 bg-emerald-950/20 flex flex-col items-center">
                        <div class="flex items-center space-x-2 mb-1">
                            <i data-lucide="sparkles" class="w-4 h-4 text-emerald-400 animate-pulse"></i>
                            <span class="text-[10px] text-emerald-400 font-bold uppercase tracking-widest">Wildcard Rule</span>
                        </div>
                        <span class="text-white font-medium text-sm px-2">${esc(state.game.activeWildcard)}</span>
                    </div>
                ` : `
                    <div class="glass-card rounded-2xl p-4 shrink-0 border border-slate-700/50 flex justify-between items-center bg-indigo-900/10">
                        <div class="text-left">
                            <span class="text-xs text-indigo-300 font-bold uppercase tracking-widest block">Phase</span>
                            <span class="text-white font-medium text-sm">Say 1 word</span>
                        </div>
                        <div class="text-right">
                            <span class="text-xs text-indigo-300 font-bold uppercase tracking-widest block">Round</span>
                            <span class="text-white font-medium text-sm">${currentRound} of ${state.settings.clueRounds}</span>
                        </div>
                    </div>
                `}
                <div id="playing-dashboard" class="glass-card rounded-[2rem] p-6 sm:p-8 text-center border relative overflow-hidden flex-1 flex flex-col justify-center shadow-xl transition-colors duration-300 ${borderClass}">
                    <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-blue-500/30 to-transparent"></div>
                    <div class="mb-4 text-slate-400 font-medium uppercase tracking-widest text-sm">Speaking Now</div>
                    <h2 class="text-4xl sm:text-5xl font-black tracking-tight mb-8 truncate ${nameColor}">${esc(activePlayer.name.trim() || 'Player')}</h2>
                    ${timerHTML}
                </div>
            </div>
            <div class="shrink-0 mt-2">
                <button onclick="advanceTurn()" class="w-full py-5 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 active:scale-95 text-white rounded-2xl font-black text-xl shadow-[0_0_20px_rgba(79,70,229,0.3)] transition-all">Next Player</button>
            </div>
        `;
    }

    // ─── Voting ───────────────────────────────────────────────────────────────────
    function renderVoting() {
        return `
            ${topBar('Vote Imposter', false)}
            <div class="text-center mb-4 bg-blue-900/10 py-3 rounded-2xl border border-blue-500/10 shrink-0">
                <p class="text-blue-200/80 font-medium text-sm sm:text-base">Discuss. Who will you execute?</p>
            </div>
            <div class="space-y-3 flex-1 overflow-y-auto pb-4 custom-scrollbar">
                ${state.players.map(p => `
                    <button onclick="openVoteModal(${p.id})" class="w-full flex items-center justify-between p-4 sm:p-5 glass-card hover:bg-white/10 active:scale-95 rounded-2xl transition-all border border-slate-700/50 group">
                        <span class="text-white font-bold text-lg sm:text-xl group-hover:text-blue-200 truncate">${esc(p.name.trim() || 'Player')}</span>
                        <div class="w-6 h-6 rounded-full border-2 border-slate-500 group-hover:border-blue-400 transition-colors shrink-0"></div>
                    </button>
                `).join('')}
            </div>
        `;
    }

    // ─── Result ───────────────────────────────────────────────────────────────────
    function renderResult() {
        const { winner, imposterIds, jesterId, lastVotedId, earnings } = state.game;
        const imposters     = state.players.filter(p => imposterIds.includes(p.id));
        const imposterNames = imposters.map(p => esc(p.name.trim() || 'Player')).join(' &amp; ');
        const suspect       = state.players.find(p => p.id === lastVotedId);
        const suspectName   = suspect ? esc(suspect.name.trim() || 'Player') : 'Someone';

        const headers = {
            jester:   { glow:'fuchsia', icon:'smile',        iconColor:'fuchsia-400', title:'Jester Wins!',      sub:`You fools executed <span class="text-white font-bold">${suspectName}</span>!` },
            players:  { glow:'blue',    icon:'trophy',       iconColor:'blue-400',    title:'Imposter Caught!',  sub:`The crew executed <span class="text-white font-bold">${suspectName}</span>.` },
            imposter: { glow:'red',     icon:'alert-circle', iconColor:'red-500',     title:'Imposter Escaped!', sub:`You executed <span class="text-white font-bold">${suspectName}</span> (Innocent).<br><span class="text-sm font-bold text-red-400 mt-1 inline-block">The Imposter was <span class="text-white text-lg">${imposterNames}</span></span>` }
        };
        const h = headers[winner] || headers.imposter;

        const sortedByEarnings = [...state.players].sort((a,b) => (earnings[b.id]||0) - (earnings[a.id]||0));
        const earningsRows = sortedByEarnings.map(p => {
            const earned = earnings[p.id] || 0;
            const colorClass = earned > 0 ? 'text-emerald-400' : earned < 0 ? 'text-red-400' : 'text-slate-400';
            const sign = earned > 0 ? '+' : '';
            let roleTag = '';
            if (imposterIds.includes(p.id)) roleTag = '<span class="text-[10px] ml-2 px-1.5 py-0.5 rounded bg-red-500/20 text-red-400 border border-red-500/30 uppercase font-bold">Imposter</span>';
            else if (jesterId === p.id)     roleTag = '<span class="text-[10px] ml-2 px-1.5 py-0.5 rounded bg-fuchsia-500/20 text-fuchsia-400 border border-fuchsia-500/30 uppercase font-bold">Jester</span>';
            return `
                <div class="flex justify-between items-center bg-black/20 rounded-lg p-2.5 px-3">
                    <div class="flex items-center flex-wrap"><span class="text-white text-sm font-medium">${esc(p.name)}</span>${roleTag}</div>
                    <span class="${colorClass} font-black text-sm w-8 text-right">${sign}${earned}</span>
                </div>
            `;
        }).join('');

        const leaderboardRows = [...state.players].sort((a,b) => b.score - a.score).map((p, i) => `
            <div class="flex justify-between items-center bg-black/20 rounded-lg p-2.5 px-3">
                <div class="flex items-center space-x-2">
                    <span class="text-slate-500 text-xs font-bold w-4">${i+1}.</span>
                    <span class="text-white text-sm font-medium">${esc(p.name)}</span>
                </div>
                <span class="${p.score < 0 ? 'text-red-400' : 'text-blue-400'} font-bold text-sm">${p.score} pt${Math.abs(p.score) !== 1 ? 's' : ''}</span>
            </div>
        `).join('');

        const champion = state.players.find(p => p.score >= state.settings.scoreLimit);
        const primaryBtnAction = champion ? 'showSeriesWinner()' : 'playNextRound()';
        const primaryBtnText   = champion ? 'View Champion' : 'Next Round';
        const primaryBtnClass  = champion
            ? 'bg-gradient-to-r from-amber-500 to-orange-500 hover:from-amber-400 hover:to-orange-400 text-white shadow-[0_0_15px_rgba(245,158,11,0.4)]'
            : 'bg-white text-slate-900 hover:bg-slate-200';

        return `
            <div class="flex-1 overflow-y-auto custom-scrollbar flex flex-col items-center py-4 space-y-6 relative z-10">
                <div class="absolute top-0 right-0 glass-card px-3 py-1.5 rounded-full border border-slate-700/50 flex space-x-2 items-center">
                    <i data-lucide="list-ordered" class="w-4 h-4 text-slate-400"></i>
                    <span class="text-xs font-bold text-slate-300">Target: ${state.settings.scoreLimit} Wins</span>
                </div>
                <div class="space-y-4 text-center pt-8 w-full max-w-sm">
                    <div class="inline-block relative">
                        <div class="absolute inset-0 blur-[50px] opacity-40 rounded-full bg-${h.glow}-500"></div>
                        <div class="relative p-6 sm:p-8 rounded-full bg-${h.glow}-500/20 border-${h.glow}-500/50 border-2">
                            <i data-lucide="${h.icon}" class="w-16 h-16 sm:w-20 sm:h-20 text-${h.iconColor}"></i>
                        </div>
                    </div>
                    <div>
                        <h1 class="text-4xl sm:text-5xl font-black uppercase tracking-tight mb-2 text-${h.glow === 'fuchsia' ? 'fuchsia' : h.glow === 'blue' ? 'blue' : 'red'}-${h.glow === 'red' ? '500' : '400'}">${h.title}</h1>
                        <p class="text-base sm:text-lg mt-2 font-medium text-slate-200">${h.sub}</p>
                    </div>
                </div>
                <div class="w-full max-w-sm glass-card rounded-2xl p-4 border border-slate-700/50">
                    <p class="text-xs text-slate-400 font-bold uppercase tracking-widest mb-3">Round Points</p>
                    <div class="space-y-1.5">${earningsRows}</div>
                </div>
                <div class="glass-card rounded-3xl p-6 sm:p-8 w-full max-w-sm space-y-5 border border-slate-700/50 shadow-2xl relative overflow-hidden ${winner === 'jester' ? 'opacity-70' : ''}">
                    <div class="text-center">
                        <p class="text-blue-300 text-[10px] sm:text-xs uppercase tracking-widest font-bold mb-1">Category</p>
                        <p class="text-white text-lg sm:text-xl font-medium">${esc(state.game.category)}</p>
                    </div>
                    <div class="h-px bg-slate-800 w-full"></div>
                    <div class="text-center">
                        <p class="text-blue-300 text-[10px] sm:text-xs uppercase tracking-widest font-bold mb-1">Secret Word</p>
                        <p class="text-white text-2xl sm:text-3xl font-black tracking-wide">${esc(state.game.secretWord)}</p>
                    </div>
                </div>
                ${state.settings.punishments && state.game.currentPunishment && state.game.punishedPlayer ? `
                    <div class="glass-card rounded-2xl p-4 border border-orange-500/30 bg-orange-950/20 w-full max-w-sm">
                        <div class="flex items-center space-x-2 justify-center mb-2">
                            <i data-lucide="flame" class="w-5 h-5 text-orange-400"></i>
                            <span class="text-orange-300 font-bold uppercase text-xs tracking-widest">Punishment Time</span>
                        </div>
                        <p class="text-white text-center font-medium text-sm px-2">
                            <span class="text-orange-400 font-bold">${esc(state.game.punishedPlayer)}</span>: ${esc(state.game.currentPunishment)}
                        </p>
                    </div>
                ` : ''}
                <div class="w-full max-w-sm glass-card rounded-2xl p-4 border border-slate-700/50">
                    <p class="text-xs text-slate-400 font-bold uppercase tracking-widest mb-3">Total Leaderboard</p>
                    <div class="space-y-1.5">${leaderboardRows}</div>
                </div>
            </div>
            <div class="shrink-0 mt-4 flex w-full max-w-sm mx-auto space-x-3">
                <button onclick="setScreen('setup')" class="flex-1 py-4 glass-card hover:bg-white/10 active:scale-95 text-white rounded-2xl font-bold transition-all">Setup</button>
                <button onclick="${primaryBtnAction}" class="flex-[2] py-4 ${primaryBtnClass} active:scale-95 rounded-2xl font-black text-lg shadow-xl transition-all">${primaryBtnText}</button>
            </div>
        `;
    }

    // ─── Actions ──────────────────────────────────────────────────────────────────
    function setScreen(name) { state.screen = name; render(); }
    function goToHome()       { setScreen('home'); }
    function goToSetup()      { setScreen('setup'); }
    function goToCategories() { setScreen('categories'); }

    function addPlayer() {
        if (state.players.length < 12) {
            state.players.push({ id: Date.now(), name: `Player ${state.players.length + 1}`, score: 0 });
            render();
        }
    }

    function removePlayer(id) {
        if (state.players.length > 3) {
            state.players = state.players.filter(p => p.id !== id);
            if (state.players.length < 5) state.settings.jesterRole = false;
            render();
        }
    }

    function updatePlayerName(id, name) {
        const p = state.players.find(p => p.id === id);
        if (p) p.name = name;
    }

    function updateImposterCount(delta) {
        const next = state.imposterCount + delta;
        const max  = Math.max(1, state.players.length - 2);
        if (next >= 1 && next <= max) { state.imposterCount = next; render(); }
    }

    function updateSetting(key, val) { state.settings[key] = val; render(); }
    function toggleSetting(key)      { state.settings[key] = !state.settings[key]; render(); }

    // ─── Category Selection ───────────────────────────────────────────────────────
    function handleCategoryClick(el) {
        const name = el.dataset.catname;
        if (!name) return;
        const idx = state.selectedCategories.indexOf(name);
        if (idx === -1) state.selectedCategories.push(name);
        else state.selectedCategories.splice(idx, 1);
        render();
    }

    function handleEditClick(btn, event) {
        event.stopPropagation();
        const id = Number(btn.dataset.editid);
        const cat = state.customCategories.find(c => c.id === id);
        if (!cat) return;
        const wordsText = cat.wordList.map((w, i) => {
            const hint = cat.hintList && cat.hintList[i];
            return hint ? `${w} (${hint})` : w;
        }).join(', ');
        state.customForm = { id: cat.id, name: cat.name, wordsText, error: '' };
        setScreen('createCustom');
    }

    function clearCategorySelection() { state.selectedCategories = []; render(); }

    function startGameFromSelection() {
        if (state.selectedCategories.length === 0) return;
        const pick = state.selectedCategories[Math.floor(Math.random() * state.selectedCategories.length)];
        startGame(pick);
    }

    // ─── Custom Category CRUD ─────────────────────────────────────────────────────
    function openCreateCustom() {
        state.customForm = { id: null, name: '', wordsText: '', error: '' };
        setScreen('createCustom');
    }

    function updateCustomForm(field, value) {
        state.customForm[field] = value;
        state.customForm.error = '';
    }

    function saveCustomCategory() {
        const name = state.customForm.name.trim();
        if (!name) { state.customForm.error = 'Category name cannot be empty.'; return render(); }
        const isDupStandard = Object.keys(WORD_DATABASE).some(n => n.toLowerCase() === name.toLowerCase());
        const isDupCustom   = state.customCategories.some(c => c.name.toLowerCase() === name.toLowerCase() && c.id !== state.customForm.id);
        if (isDupStandard || isDupCustom) { state.customForm.error = 'A category with this name already exists.'; return render(); }
        const tokens = state.customForm.wordsText.split(/[,;\n]+/).map(t => t.trim()).filter(t => t.length > 0).map(parseWordToken);
        if (tokens.length < 3) { state.customForm.error = 'Please enter at least 3 valid words.'; return render(); }
        const wordList = tokens.map(t => t.word);
        const hintList = tokens.map(t => t.hint);
        const entry = { id: state.customForm.id || Date.now(), name, words: wordList.length, type: 'custom', wordList, hintList };
        if (state.customForm.id) {
            const idx = state.customCategories.findIndex(c => c.id === state.customForm.id);
            if (idx !== -1) state.customCategories[idx] = entry;
        } else {
            state.customCategories.push(entry);
        }
        saveCategoriesToStorage();
        state.customForm = { id: null, name: '', wordsText: '', error: '' };
        setScreen('categories');
    }

    function openDeleteModal()  { getEl('delete-modal').classList.remove('hidden'); getEl('delete-modal').classList.add('flex'); }
    function closeDeleteModal() { getEl('delete-modal').classList.add('hidden');    getEl('delete-modal').classList.remove('flex'); }

    function confirmDeleteCategory() {
        if (!state.customForm.id) return;
        const catName = state.customCategories.find(c => c.id === state.customForm.id)?.name;
        state.customCategories = state.customCategories.filter(c => c.id !== state.customForm.id);
        if (catName) state.selectedCategories = state.selectedCategories.filter(n => n !== catName);
        saveCategoriesToStorage();
        closeDeleteModal();
        state.customForm = { id: null, name: '', wordsText: '', error: '' };
        setScreen('categories');
    }

    // ─── Game Flow ────────────────────────────────────────────────────────────────
    function startGame(categoryName) {
        let wordList, hintList;
        if (WORD_DATABASE[categoryName]) {
            wordList = WORD_DATABASE[categoryName];
            hintList = null;
        } else {
            const custom = state.customCategories.find(c => c.name === categoryName);
            if (!custom || !custom.wordList.length) return;
            wordList = custom.wordList;
            hintList = custom.hintList || null;
        }
        const idx        = Math.floor(Math.random() * wordList.length);
        const secretWord = wordList[idx];
        let hint = '';
        if (hintList) {
            hint = hintList[idx] || GENERIC_HINTS[Math.floor(Math.random() * GENERIC_HINTS.length)];
        } else {
            hint = HINT_DATABASE[secretWord] || GENERIC_HINTS[Math.floor(Math.random() * GENERIC_HINTS.length)];
        }
        const rolePool    = shuffle(state.players);
        const imposterIds = rolePool.slice(0, state.imposterCount).map(p => p.id);
        let jesterId = null;
        if (state.settings.jesterRole && state.players.length >= 5) {
            const nonImposters = rolePool.filter(p => !imposterIds.includes(p.id));
            if (nonImposters.length > 0) jesterId = nonImposters[0].id;
        }
        const activeWildcard = state.settings.wildcardRounds ? WILDCARDS[Math.floor(Math.random() * WILDCARDS.length)] : null;
        state.game = {
            category: categoryName, secretWord, hint,
            imposterIds, jesterId, activeWildcard,
            currentPlayerIndex: 0, roleRevealed: false, winner: null,
            shuffledPlayers: shuffle(state.players),
            activeTurnIndex: 0, timeLeft: state.settings.timeLimit,
            currentPunishment: '', punishedPlayer: null,
            lastVotedId: null, earnings: {}
        };
        setScreen('reveal');
    }

    function revealRole()  { state.game.roleRevealed = true; render(); }

    function nextReveal() {
        if (state.game.currentPlayerIndex < state.players.length - 1) {
            state.game.currentPlayerIndex++;
            state.game.roleRevealed = false;
            render();
        } else {
            setScreen('playing');
        }
    }

    function advanceTurn() {
        state.game.activeTurnIndex++;
        state.game.timeLeft = state.settings.timeLimit;
        render();
    }

    // ─── Voting ───────────────────────────────────────────────────────────────────
    function openVoteModal(playerId) {
        state.pendingVoteId = playerId;
        const p = state.players.find(p => p.id === playerId);
        getEl('vote-target-name').innerText = p ? p.name : 'Player';
        getEl('confirm-vote-btn').onclick = confirmVote;
        getEl('vote-modal').classList.remove('hidden');
        getEl('vote-modal').classList.add('flex');
    }
    function closeVoteModal() {
        getEl('vote-modal').classList.add('hidden');
        getEl('vote-modal').classList.remove('flex');
    }

    function confirmVote() {
        const suspectId = state.pendingVoteId;
        closeVoteModal();
        state.pendingVoteId = null;
        state.game.lastVotedId = suspectId;
        state.game.earnings = {};
        if (state.game.jesterId === suspectId) {
            state.game.winner = 'jester';
            state.players.forEach(p => {
                const pts = p.id === suspectId ? 2 : 0;
                p.score += pts; state.game.earnings[p.id] = pts;
            });
        } else if (state.game.imposterIds.includes(suspectId)) {
            state.game.winner = 'players';
            state.players.forEach(p => {
                let pts = 0;
                if (state.game.imposterIds.includes(p.id))  pts = -1;
                else if (p.id !== state.game.jesterId)       pts = 1;
                p.score += pts; state.game.earnings[p.id] = pts;
            });
        } else {
            state.game.winner = 'imposter';
            state.players.forEach(p => {
                let pts = 0;
                if (state.game.imposterIds.includes(p.id)) pts = 2;
                else if (p.id === suspectId)                pts = -1;
                p.score += pts; state.game.earnings[p.id] = pts;
            });
        }
        if (state.settings.punishments) {
            let loserPool = [];
            if      (state.game.winner === 'jester')  loserPool = state.players.filter(p => p.id !== state.game.jesterId && !state.game.imposterIds.includes(p.id));
            else if (state.game.winner === 'players') loserPool = state.players.filter(p => state.game.imposterIds.includes(p.id));
            else                                      loserPool = state.players.filter(p => !state.game.imposterIds.includes(p.id) && p.id !== state.game.jesterId);
            if (!loserPool.length) loserPool = state.players;
            const punished = loserPool[Math.floor(Math.random() * loserPool.length)];
            state.game.currentPunishment = PUNISHMENTS[Math.floor(Math.random() * PUNISHMENTS.length)];
            state.game.punishedPlayer    = punished.name.trim() || 'Someone';
        }
        setScreen('result');
    }

    // ─── Series ───────────────────────────────────────────────────────────────────
    function showSeriesWinner() {
        const champion = state.players.find(p => p.score >= state.settings.scoreLimit);
        if (!champion) return;
        getEl('champion-name').innerText = champion.name;
        getEl('winner-modal').classList.remove('hidden');
        getEl('winner-modal').classList.add('flex');
        confettiEffect();
    }
    function playNextRound() { setScreen('categories'); }
    function resetSeries() {
        getEl('winner-modal').classList.add('hidden');
        getEl('winner-modal').classList.remove('flex');
        state.players.forEach(p => p.score = 0);
        setScreen('setup');
    }

    // ─── Timer ────────────────────────────────────────────────────────────────────
    function manageTimer() {
        if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
        if (state.screen !== 'playing' || state.settings.timeLimit <= 0) return;
        const totalTurns = state.game.shuffledPlayers.length * state.settings.clueRounds;
        if (state.game.activeTurnIndex >= totalTurns || state.game.timeLeft <= 0) return;
        timerInterval = setInterval(() => {
            if (state.game.timeLeft > 0) { state.game.timeLeft--; updateTimerUI(); }
            if (state.game.timeLeft <= 0) { clearInterval(timerInterval); timerInterval = null; render(); }
        }, 1000);
    }

    function updateTimerUI() {
        const textEl      = getEl('turn-timer-text');
        const circleEl    = getEl('turn-timer-circle');
        const dashboardEl = getEl('playing-dashboard');
        if (!textEl || !circleEl || !dashboardEl) return;
        const { timeLeft } = state.game;
        const warning = timeLeft <= 3 && timeLeft > 0;
        const failed  = timeLeft === 0;
        textEl.innerText = timeLeft;
        circleEl.className = `w-24 h-24 rounded-full border-4 flex items-center justify-center shadow-inner transition-colors duration-300 ${warning ? 'border-amber-500/50 text-amber-400 bg-amber-500/10 animate-pulse-fast' : failed ? 'border-red-500/50 text-red-500 bg-red-500/10' : 'border-blue-500/30 text-blue-300 bg-black/20'}`;
        dashboardEl.className = `glass-card rounded-[2rem] p-6 sm:p-8 text-center border relative overflow-hidden flex-1 flex flex-col justify-center shadow-xl transition-colors duration-300 ${warning ? 'border-amber-500/50 bg-amber-950/30' : failed ? 'border-red-500/50 bg-red-950/40' : 'border-blue-500/30'}`;
    }

    // ─── Confetti ─────────────────────────────────────────────────────────────────
    function confettiEffect() {
        const modal  = getEl('winner-modal');
        const colors = ['#f59e0b','#3b82f6','#ef4444','#10b981','#a855f7','#d946ef'];
        for (let i = 0; i < 50; i++) {
            const el = document.createElement('div');
            Object.assign(el.style, { position:'absolute', width:'10px', height:'10px', backgroundColor: colors[Math.floor(Math.random()*colors.length)], left:'50%', top:'50%', opacity:'1', zIndex:'40', transform:'translate(-50%,-50%)', transition:'all 1s cubic-bezier(0.1,0.8,0.3,1)' });
            modal.appendChild(el);
            setTimeout(() => {
                const a = Math.random() * Math.PI * 2;
                const v = 100 + Math.random() * 200;
                el.style.transform = `translate(calc(-50% + ${Math.cos(a)*v}px), calc(-50% + ${Math.sin(a)*v}px)) rotate(${Math.random()*720}deg)`;
                el.style.opacity = '0';
            }, 50);
            setTimeout(() => el.remove(), 1050);
        }
    }

    // ─── Init ─────────────────────────────────────────────────────────────────────
    window.onload = () => { loadCategoriesFromStorage(); render(); };
    </script>
</body>
</html>
