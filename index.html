<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Imposter Game</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    animation: { 'pulse-fast': 'pulse-fast 0.5s ease-in-out infinite' },
                    keyframes: { 'pulse-fast': { '0%, 100%': { transform: 'scale(1)', opacity: '1' }, '50%': { transform: 'scale(1.05)', opacity: '0.8' } } }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #050810; color: #f1f5f9; margin: 0; overflow: hidden; }
        .glass-card { background: rgba(26,31,46,0.6); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(148,163,184,0.3); border-radius: 4px; }
        .screen-container { display: none; animation: fadeIn 0.3s ease-out; height: 100%; flex-direction: column; position: relative; z-index: 10; }
        .screen-container.active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .bg-gradient-overlay { position: absolute; inset: 0; pointer-events: none; z-index: 0; background: linear-gradient(to bottom, rgba(30,58,138,0.1), transparent, rgba(0,0,0,0.6)); }
        .cat-checkbox { appearance: none; -webkit-appearance: none; width: 20px; height: 20px; border: 2px solid #475569; border-radius: 6px; cursor: pointer; transition: all 0.15s; flex-shrink: 0; position: relative; }
        .cat-checkbox:checked { background: #3b82f6; border-color: #3b82f6; }
        .cat-checkbox:checked::after { content: ''; position: absolute; left: 4px; top: 1px; width: 8px; height: 12px; border: 2px solid white; border-top: none; border-left: none; transform: rotate(45deg); }
    </style>
</head>
<body class="min-h-[100dvh] flex items-center justify-center selection:bg-blue-500/30 p-0 sm:p-4">

    <div class="w-full h-[100dvh] sm:h-full sm:max-h-[850px] sm:max-w-[400px] bg-[#090E17] relative sm:rounded-[2.5rem] shadow-2xl overflow-hidden flex flex-col sm:border sm:border-slate-700/50 ring-0 sm:ring-8 sm:ring-black/50">
        <div class="bg-gradient-overlay"></div>
        <div id="app-root" class="relative z-10 flex-1 flex flex-col px-5 sm:px-6 h-full overflow-hidden pb-4 sm:pb-6"></div>

        <!-- Vote Modal -->
        <div id="vote-modal" class="hidden absolute inset-0 z-50 items-center justify-center p-4 bg-black/60 backdrop-blur-sm">
            <div class="glass-card w-full max-w-sm p-6 sm:p-8 rounded-[2rem] text-center shadow-2xl border border-slate-600">
                <div class="bg-red-500/20 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 border border-red-500/30">
                    <i data-lucide="alert-circle" class="text-red-400 w-8 h-8"></i>
                </div>
                <h3 class="text-xl sm:text-2xl font-black text-white mb-2 leading-tight">Execute <span id="vote-target-name" class="text-red-400">Player</span>?</h3>
                <p class="text-sm text-slate-300 mb-8 px-2">Make sure you caught the right person...</p>
                <div class="flex space-x-3">
                    <button onclick="closeVoteModal()" class="flex-1 py-3.5 bg-slate-800 hover:bg-slate-700 text-white rounded-xl font-bold transition-colors">Cancel</button>
                    <button id="confirm-vote-btn" class="flex-1 py-3.5 bg-red-600 hover:bg-red-500 text-white rounded-xl font-bold shadow-[0_0_15px_rgba(220,38,38,0.4)] transition-all">Confirm</button>
                </div>
            </div>
        </div>

        <!-- Delete Modal -->
        <div id="delete-modal" class="hidden absolute inset-0 z-50 items-center justify-center p-4 bg-black/80 backdrop-blur-md">
            <div class="glass-card w-full max-w-sm p-6 sm:p-8 rounded-[2rem] text-center shadow-2xl border border-red-500/50">
                <div class="bg-red-500/20 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 border border-red-500/30">
                    <i data-lucide="trash-2" class="text-red-400 w-8 h-8"></i>
                </div>
                <h3 class="text-xl sm:text-2xl font-black text-white mb-2">Delete Category?</h3>
                <p class="text-sm text-slate-300 mb-8 px-2">This action cannot be undone. Are you completely sure?</p>
                <div class="flex space-x-3">
                    <button onclick="closeDeleteModal()" class="flex-1 py-3.5 bg-slate-800 hover:bg-slate-700 text-white rounded-xl font-bold transition-colors">Cancel</button>
                    <button onclick="confirmDeleteCategory()" class="flex-1 py-3.5 bg-red-600 hover:bg-red-500 text-white rounded-xl font-bold shadow-[0_0_15px_rgba(220,38,38,0.4)] transition-all">Delete</button>
                </div>
            </div>
        </div>

        <!-- Winner Modal -->
        <div id="winner-modal" class="hidden absolute inset-0 z-50 items-center justify-center p-4 bg-black/80 backdrop-blur-md">
            <div class="glass-card w-full max-w-sm p-6 sm:p-8 rounded-[2rem] text-center shadow-2xl border border-amber-500/50">
                <div class="bg-amber-500/20 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-4 border border-amber-500/50">
                    <i data-lucide="trophy" class="text-amber-400 w-10 h-10"></i>
                </div>
                <h3 class="text-2xl font-black text-white mb-2">Series Champion!</h3>
                <p id="champion-name" class="text-3xl font-black text-amber-400 mb-6 tracking-wide truncate px-2">Player Name</p>
                <p class="text-sm text-slate-300 mb-8">They have reached the score limit and dominated the session.</p>
                <button onclick="resetSeries()" class="w-full py-4 bg-gradient-to-r from-amber-600 to-orange-600 hover:from-amber-500 hover:to-orange-500 text-white rounded-xl font-bold shadow-lg transition-all">Start New Session</button>
            </div>
        </div>
    </div>

    // ─── Storage ─────────────────────────────────────────────────────────────────
    const STORAGE_KEY = 'imposterGame_customCategories';

    function loadCategoriesFromStorage() {
        try {
            const stored = localStorage.getItem(STORAGE_KEY);
            if (stored) {
                const parsed = JSON.parse(stored);
                state.customCategories = parsed.map(cat => ({
                    ...cat,
                    id: cat.id || (Date.now() + Math.random())
                }));
            }
        } catch(e) {
            console.error('Failed to load custom categories:', e);
            state.customCategories = [];
        }
    }

    function saveCategoriesToStorage() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state.customCategories));
    }

    // ─── Utilities ───────────────────────────────────────────────────────────────
    const shuffle = arr => {
        const a = [...arr];
        for (let i = a.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
    };

    const getEl = id => document.getElementById(id);
    const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    const updateIcons = () => lucide.createIcons();

    function parseWordToken(token) {
        const match = token.match(/^(.+?)\s*\(([^)]+)\)\s*$/);
        if (match) return { word: match[1].trim(), hint: match[2].trim() };
        return { word: token.trim(), hint: null };
    }

    // ─── Render ──────────────────────────────────────────────────────────────────

            case 'howToPlay':    container.innerHTML = renderHowToPlay();    break;
            case 'setup':        container.innerHTML = renderSetup();        break;
            case 'categories':   container.innerHTML = renderCategories();   break;
            case 'createCustom': container.innerHTML = renderCreateCustom(); break;
            case 'reveal':       container.innerHTML = renderReveal();       break;
            case 'playing':      container.innerHTML = renderPlaying();      break;
            case 'voting':       container.innerHTML = renderVoting();       break;
            case 'result':       container.innerHTML = renderResult();       break;
            default:             container.innerHTML = renderHome();
        }
        root.innerHTML = '';
        root.appendChild(container);
        updateIcons();
        manageTimer();
    }

    function topBar(title, showBack, backAction) {
        backAction = backAction || 'goToHome';
        return '<div class="flex items-center mb-4 sm:mb-6 pt-6 relative z-10 shrink-0">'
            + (showBack ? '<button onclick="' + backAction + '()" class="p-2 -ml-2 text-slate-300 hover:text-white transition-colors bg-white/5 rounded-full backdrop-blur-sm mr-3"><i data-lucide="chevron-left" class="w-6 h-6"></i></button>' : '')
            + '<h1 class="text-xl sm:text-2xl font-bold text-white tracking-wide">' + esc(title) + '</h1>'
            + '</div>';
    }

    // ─── Home ─────────────────────────────────────────────────────────────────────
    function renderHome() {
        return '<div class="flex-1 overflow-y-auto flex flex-col items-center justify-center relative z-10 pb-6">'
            + '<div class="text-center space-y-6 mt-12 mb-auto">'
            + '<div class="relative inline-block"><div class="absolute inset-0 bg-blue-500 blur-[40px] opacity-30 rounded-full"></div>'

            + '<i data-lucide="search" class="w-16 h-16 text-blue-400 drop-shadow-[0_0_15px_rgba(96,165,250,0.5)]"></i></div></div>'
            + '<div><h1 class="text-5xl sm:text-6xl font-black text-transparent bg-clip-text bg-gradient-to-r from-white via-blue-100 to-slate-400 tracking-tighter drop-shadow-lg mb-2">IMPOSTER</h1>'

            + '<div class="w-full max-w-[280px] sm:max-w-xs space-y-4 shrink-0 mt-8">'
            + '<button onclick="setScreen(\'setup\')" class="w-full py-4 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 active:scale-95 text-white rounded-2xl font-bold text-lg shadow-[0_0_20px_rgba(79,70,229,0.3)] transition-all flex items-center justify-center space-x-2"><i data-lucide="play" class="w-6 h-6 fill-current"></i><span>Play Now</span></button>'
            + '<button onclick="setScreen(\'howToPlay\')" class="w-full py-4 glass-card hover:bg-white/10 active:scale-95 text-white rounded-2xl font-semibold text-lg transition-all">How to Play</button>'
            + '</div></div>';
    }

    // ─── How To Play ──────────────────────────────────────────────────────────────
    function renderHowToPlay() {
        var steps = [
            { icon:'settings',       title:'Setup Game',       desc:'Choose players, adjust imposters, and tweak advanced settings.' },
            { icon:'eye',            title:'Reveal Words',      desc:'Everyone sees the secret word except the imposter(s).' },
            { icon:'message-square', title:'Give Clues',        desc:'Take turns saying exactly ONE word related to your secret.' },
            { icon:'search',         title:'Find the Imposter', desc:'Discuss and vote. Beware the Jester!' }
        ];
        var html = topBar('How to Play', true, 'goToHome');
        html += '<div class="flex-1 overflow-y-auto space-y-4 pb-4 pr-1 custom-scrollbar">';
        steps.forEach(function(s) {
            html += '<div class="glass-card p-4 sm:p-5 rounded-2xl flex items-start space-x-4">'
                + '<div class="bg-blue-500/10 p-3 rounded-full flex-shrink-0 mt-1 border border-blue-500/20"><i data-lucide="' + s.icon + '" class="w-6 h-6 text-blue-400"></i></div>'
                + '<div><h3 class="text-white font-bold text-base sm:text-lg mb-1">' + s.title + '</h3><p class="text-slate-300 leading-relaxed text-sm">' + s.desc + '</p></div>'

    // ─── Setup ────────────────────────────────────────────────────────────────────

        var maxImposters = Math.max(1, state.players.length - 2);
        if (state.imposterCount > maxImposters) state.imposterCount = maxImposters;
        var canEnableJester = state.players.length >= 5;

        function toggle(key, color) {
            var on = state.settings[key];
            return '<button onclick="toggleSetting(\'' + key + '\')" class="w-12 h-6 rounded-full transition-colors relative flex items-center px-1 shrink-0 ' + (on ? 'bg-' + color + '-600' : 'bg-slate-700') + '">'
                + '<div class="w-4 h-4 bg-white rounded-full transition-transform ' + (on ? 'translate-x-6' : 'translate-x-0') + '"></div></button>';
        }

        var html = topBar('Setup Game', true, 'goToHome');
        html += '<div class="flex-1 overflow-y-auto custom-scrollbar pr-1 pb-4 flex flex-col space-y-4">';

        html += '<div class="glass-card rounded-3xl p-4 sm:p-5 flex flex-col shrink-0 min-h-[220px] max-h-[350px]">'

            + '<span class="text-white font-semibold flex items-center text-base sm:text-lg"><i data-lucide="users" class="w-5 h-5 mr-2 text-blue-400"></i> ' + state.players.length + ' Players</span>'

        state.players.forEach(function(p, i) {
            html += '<div class="flex items-center space-x-3">'
                + '<div class="bg-slate-800/80 border border-slate-700 text-blue-400 w-10 h-10 rounded-full flex items-center justify-center font-bold text-sm shrink-0">' + (i+1) + '</div>'
                + '<input type="text" value="' + esc(p.name) + '" oninput="updatePlayerName(' + p.id + ', this.value)" class="flex-1 bg-black/20 border border-slate-700/50 text-white rounded-xl px-4 py-3 focus:outline-none focus:border-blue-500/50 transition-all" placeholder="Player ' + (i+1) + '">'
                + '<div class="flex items-center space-x-2">'

                + '</div></div>';
        });
        html += '</div></div>';

        // Imposters
        html += '<div class="space-y-3 shrink-0">'
            + '<div class="glass-card rounded-2xl p-4 flex justify-between items-center">'
            + '<div class="flex items-center space-x-2"><i data-lucide="alert-circle" class="w-5 h-5 text-red-400"></i><span class="text-white font-semibold">Imposters</span></div>'
            + '<div class="flex items-center space-x-4 bg-black/30 rounded-xl p-1 border border-slate-700/50">'
            + '<button onclick="updateImposterCount(-1)" ' + (state.imposterCount <= 1 ? 'disabled' : '') + ' class="p-2 text-slate-400 hover:text-white disabled:opacity-30 transition-colors"><i data-lucide="minus" class="w-4 h-4"></i></button>'
            + '<span class="text-white font-bold w-4 text-center">' + state.imposterCount + '</span>'
            + '<button onclick="updateImposterCount(1)" ' + (state.imposterCount >= maxImposters ? 'disabled' : '') + ' class="p-2 text-slate-400 hover:text-white disabled:opacity-30 transition-colors"><i data-lucide="plus" class="w-4 h-4"></i></button>'
            + '</div></div>';

        // Score limit
        html += '<div class="glass-card rounded-2xl p-4 flex justify-between items-center">'
            + '<div class="flex items-center space-x-2"><i data-lucide="trophy" class="w-5 h-5 text-amber-400"></i><span class="text-white font-semibold">Play To (Wins)</span></div>'
            + '<div class="flex bg-black/30 rounded-xl p-1 border border-slate-700/50">';
        [3,5,10].forEach(function(n) {
            html += '<button onclick="updateSetting(\'scoreLimit\',' + n + ')" class="w-10 py-1.5 text-xs font-bold rounded-lg transition-colors ' + (state.settings.scoreLimit === n ? 'bg-amber-600 text-white' : 'text-slate-400 hover:text-slate-200') + '">' + n + '</button>';
        });
        html += '</div></div>';

        // Advanced settings
        html += '<div class="glass-card rounded-2xl p-4 space-y-5">'
            + '<div class="flex items-center space-x-2 border-b border-slate-700/50 pb-2"><i data-lucide="settings-2" class="w-4 h-4 text-purple-400"></i><span class="text-white font-semibold text-sm uppercase tracking-wide">Advanced Settings</span></div>';

        var rows = [
            { key:'blindImposter',  color:'purple', icon:'eye-off',     label:'Blind Imposter',    sub:'Hide category from Imposter' },
            { key:'imposterHints',  color:'cyan',   icon:'help-circle', label:'Imposter Hints',    sub:'Give a vague 1-word hint' },
            { key:'punishments',    color:'orange', icon:'flame',       label:'Party Punishments', sub:'Losers get a random dare' },
            { key:'wildcardRounds', color:'emerald',icon:'sparkles',    label:'Wildcard Rounds',   sub:'Random goofy rule each game' }
        ];
        rows.forEach(function(row) {
            var on = state.settings[row.key];
            html += '<div class="flex items-center justify-between">'
                + '<div class="flex items-center space-x-2"><i data-lucide="' + row.icon + '" class="w-4 h-4 ' + (on ? 'text-' + row.color + '-400' : 'text-slate-500') + '"></i>'
                + '<div><span class="text-slate-200 text-sm font-medium block">' + row.label + '</span><span class="text-slate-500 text-[10px] block">' + row.sub + '</span></div></div>'
                + toggle(row.key, row.color) + '</div>';
        });

        // Jester
        var jOn = state.settings.jesterRole && canEnableJester;
        html += '<div class="flex items-center justify-between ' + (!canEnableJester ? 'opacity-50' : '') + '">'
            + '<div class="flex items-center space-x-2"><i data-lucide="smile" class="w-4 h-4 ' + (jOn ? 'text-fuchsia-400' : 'text-slate-500') + '"></i>'
            + '<div><span class="text-slate-200 text-sm font-medium flex items-center">Jester Role ' + (!canEnableJester ? '<i data-lucide="lock" class="w-3 h-3 ml-1 text-slate-500"></i>' : '') + '</span>'
            + '<span class="text-slate-500 text-[10px] block">' + (!canEnableJester ? 'Requires 5+ players' : 'Act suspicious. Get voted to win.') + '</span></div></div>'
            + '<button onclick="' + (canEnableJester ? "toggleSetting('jesterRole')" : '') + '" class="w-12 h-6 rounded-full transition-colors relative flex items-center px-1 shrink-0 ' + (jOn ? 'bg-fuchsia-600' : 'bg-slate-700') + ' ' + (!canEnableJester ? 'cursor-not-allowed' : '') + '">'
            + '<div class="w-4 h-4 bg-white rounded-full transition-transform ' + (jOn ? 'translate-x-6' : 'translate-x-0') + '"></div></button></div>';

        // Clues per round
        html += '<div class="flex flex-col space-y-2 pt-2 border-t border-slate-700/50">'
            + '<div class="flex items-center space-x-2"><i data-lucide="rotate-ccw" class="w-4 h-4 text-blue-400"></i><span class="text-slate-200 text-sm font-medium">Clues per Round</span></div>'
            + '<div class="flex bg-black/30 rounded-xl p-1 border border-slate-700/50">';
        [1,2,3,4,5].forEach(function(n) {
            html += '<button onclick="updateSetting(\'clueRounds\',' + n + ')" class="flex-1 py-1.5 text-xs font-bold rounded-lg transition-colors ' + (state.settings.clueRounds === n ? 'bg-blue-600 text-white' : 'text-slate-400 hover:text-slate-200') + '">' + n + '</button>';
        });
        html += '</div></div>';

        // Timer
        html += '<div class="flex flex-col space-y-2">'
            + '<div class="flex items-center space-x-2"><i data-lucide="timer" class="w-4 h-4 text-amber-400"></i><span class="text-slate-200 text-sm font-medium">Turn Timer</span></div>'
            + '<div class="flex bg-black/30 rounded-xl p-1 border border-slate-700/50">';
        [{l:'Off',v:0},{l:'5s',v:5},{l:'10s',v:10},{l:'15s',v:15}].forEach(function(o) {
            html += '<button onclick="updateSetting(\'timeLimit\',' + o.v + ')" class="flex-1 py-1.5 text-xs font-bold rounded-lg transition-colors ' + (state.settings.timeLimit === o.v ? 'bg-amber-600 text-white' : 'text-slate-400 hover:text-slate-200') + '">' + o.l + '</button>';
        });
        html += '</div></div></div></div></div>';

        html += '<div class="shrink-0 mt-2"><button onclick="setScreen(\'categories\')" class="w-full py-4 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 active:scale-95 text-white rounded-2xl font-bold text-lg shadow-[0_0_20px_rgba(79,70,229,0.3)] transition-all flex justify-center items-center">Choose Category <i data-lucide="arrow-right" class="w-5 h-5 ml-2"></i></button></div>';
        return html;
    }

    // ─── Categories ───────────────────────────────────────────────────────────────
    function renderCategoryCard(cat) {
        var isPro      = cat.type === 'pro';
        var isCustom   = cat.type === 'custom';
        var isSelected = state.selectedCategories.indexOf(cat.name) !== -1;

        var bgClass = isSelected ? 'bg-blue-600/30 border-blue-400/70 shadow-[0_0_12px_rgba(59,130,246,0.3)]'
                    : isPro     ? 'bg-gradient-to-br from-[#1a1c29] to-[#2d2411] border-amber-500/30'
                    : isCustom  ? 'bg-gradient-to-br from-[#1c1229] to-[#2d112b] border-fuchsia-500/30'
                    :             'glass-card border-blue-500/20';
        var dotClass = isPro ? 'bg-amber-400' : isCustom ? 'bg-fuchsia-400' : 'bg-blue-400';
        var editBtn  = isCustom
            ? '<button data-editid="' + cat.id + '" onclick="handleEditClick(this, event)" class="p-1.5 bg-fuchsia-500/20 text-fuchsia-300 hover:text-white hover:bg-fuchsia-500/60 rounded-full transition-all z-20"><i data-lucide="pencil" class="w-3.5 h-3.5"></i></button>'
            : '';

        return '<div class="relative flex flex-col justify-between p-4 sm:p-5 rounded-2xl aspect-[4/3] text-left overflow-hidden border ' + bgClass + ' transition-all active:scale-95 cursor-pointer" data-catname="' + esc(cat.name) + '" onclick="handleCategoryClick(this)">'
            + '<div class="absolute top-2 right-2 z-20 pointer-events-none"><input type="checkbox" class="cat-checkbox" ' + (isSelected ? 'checked' : '') + ' readonly></div>'
            + '<div class="relative z-10 pr-6"><h3 class="text-white font-bold text-base sm:text-lg leading-tight break-words">' + esc(cat.name) + '</h3>'
            + (isPro ? '<div class="mt-1 bg-amber-500/20 text-amber-400 text-[10px] font-bold px-1.5 py-0.5 rounded inline-flex items-center space-x-1 border border-amber-500/50"><i data-lucide="sparkles" class="w-3 h-3"></i><span>PRO</span></div>' : '')
            + '</div>'
            + '<div class="flex items-center justify-between relative z-10 mt-auto pt-2">'
            + '<div class="flex items-center space-x-2"><div class="w-2 h-2 rounded-full ' + dotClass + '"></div><span class="text-slate-300 text-xs font-medium">' + cat.words + ' words</span></div>'
            + editBtn + '</div></div>';
    }

    function renderCategories() {
        var freeCats = Object.keys(WORD_DATABASE)
            .filter(function(n) { return ['NFL QBs','Clash Royale','Anime','Superpowers'].indexOf(n) === -1; })
            .map(function(n) { return { name: n, words: WORD_DATABASE[n].length, type: 'free' }; });
        var proCats = ['NFL QBs','Clash Royale','Anime','Superpowers']
            .map(function(n) { return { name: n, words: WORD_DATABASE[n].length, type: 'pro' }; });
        var selCount = state.selectedCategories.length;

        var html = topBar('Select Category', true, 'goToSetup');
        html += '<div class="shrink-0 mb-3 flex items-center justify-between glass-card rounded-2xl px-4 py-3 border border-slate-700/50">'
            + '<span class="text-sm font-semibold ' + (selCount > 0 ? 'text-blue-300' : 'text-slate-400') + '">' + (selCount === 0 ? 'Tap categories to select' : selCount + ' selected \u2014 random pick') + '</span>'
            + (selCount > 0 ? '<button onclick="clearCategorySelection()" class="text-xs text-slate-400 hover:text-white transition-colors">Clear</button>' : '')
            + '</div>';

        html += '<div class="flex-1 overflow-y-auto pb-4 pr-1 custom-scrollbar space-y-6">';
        html += '<div><h2 class="text-blue-300 font-bold uppercase tracking-widest text-xs mb-3 px-1">Standard</h2><div class="grid grid-cols-2 gap-3 sm:gap-4">' + freeCats.map(renderCategoryCard).join('') + '</div></div>';
        html += '<div><h2 class="text-amber-400/80 font-bold uppercase tracking-widest text-xs mb-3 px-1 flex items-center space-x-1"><i data-lucide="sparkles" class="w-3 h-3"></i><span>Special &amp; Pop Culture</span></h2><div class="grid grid-cols-2 gap-3 sm:gap-4">' + proCats.map(renderCategoryCard).join('') + '</div></div>';
        html += '<div><h2 class="text-fuchsia-400/80 font-bold uppercase tracking-widest text-xs mb-3 px-1">Your Categories</h2><div class="grid grid-cols-2 gap-3 sm:gap-4">'
            + state.customCategories.map(renderCategoryCard).join('')
            + '<button onclick="openCreateCustom()" class="relative flex flex-col items-center justify-center p-4 sm:p-5 rounded-2xl aspect-[4/3] transition-all active:scale-95 glass-card border-dashed border-2 border-slate-600 hover:border-blue-400 hover:bg-blue-500/5 group"><div class="bg-slate-800 group-hover:bg-blue-500/20 p-2 sm:p-3 rounded-full mb-2 transition-colors"><i data-lucide="plus" class="w-6 h-6 text-slate-400 group-hover:text-blue-400 transition-colors"></i></div><span class="text-slate-300 font-bold text-xs sm:text-sm">Create New</span></button>'
            + '</div></div></div>';

        var btnClass = selCount > 0
            ? 'bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 active:scale-95 text-white shadow-[0_0_20px_rgba(79,70,229,0.3)]'
            : 'bg-slate-800 text-slate-500 cursor-not-allowed';
        var btnLabel = selCount > 1 ? '<i data-lucide="shuffle" class="w-5 h-5 mr-2"></i>Play Random Pick' : selCount === 1 ? 'Play Selected' : 'Select a Category';
        html += '<div class="shrink-0 mt-2"><button onclick="startGameFromSelection()" ' + (selCount === 0 ? 'disabled' : '') + ' class="w-full py-4 rounded-2xl font-bold text-lg transition-all flex justify-center items-center ' + btnClass + '">' + btnLabel + '</button></div>';
        return html;
    }

    // ─── Create / Edit Custom ─────────────────────────────────────────────────────
    function renderCreateCustom() {
        var isEditing = !!state.customForm.id;
        var html = topBar(isEditing ? 'Edit Category' : 'New Category', true, 'goToCategories');
        html += '<div class="flex-1 overflow-y-auto pb-4 custom-scrollbar"><div class="glass-card rounded-3xl p-5 sm:p-6 space-y-6">';
        if (state.customForm.error) {
            html += '<div class="bg-red-500/10 border border-red-500/50 p-3 rounded-xl flex items-start space-x-2 text-red-400 text-sm"><i data-lucide="alert-circle" class="w-5 h-5 shrink-0 mt-0.5"></i><span>' + esc(state.customForm.error) + '</span></div>';
        }
        html += '<div class="space-y-2"><label class="text-xs sm:text-sm font-bold text-blue-300 uppercase tracking-wider">Category Name</label>'

            + '<textarea oninput="updateCustomForm(\'wordsText\', this.value)" placeholder="Iron Man (Hero), Thor (God), Hulk (Strong)..." class="w-full h-44 sm:h-52 bg-black/30 border border-slate-700 text-white rounded-xl px-4 py-3 focus:outline-none focus:border-blue-500 transition-all resize-none placeholder:text-slate-600 leading-relaxed custom-scrollbar">' + esc(state.customForm.wordsText) + '</textarea></div>'
            + '</div></div>';
        html += '<div class="shrink-0 mt-2 space-y-3">'

            + '</div>';
        return html;
    }

    // ─── Reveal ───────────────────────────────────────────────────────────────────
    function renderReveal() {
        var currentPlayer = state.players[state.game.currentPlayerIndex];
        var isImposter    = state.game.imposterIds.indexOf(currentPlayer.id) !== -1;
        var isJester      = state.game.jesterId === currentPlayer.id;
        var displayName   = currentPlayer.name.trim() || 'Player ' + (state.game.currentPlayerIndex + 1);
        var cardContent   = '';

        if (!state.game.roleRevealed) {
            cardContent = '<button onclick="revealRole()" class="w-full py-12 sm:py-14 bg-black/40 hover:bg-black/60 active:scale-95 rounded-2xl border-2 border-dashed border-slate-600 hover:border-blue-400 flex flex-col items-center justify-center space-y-4 transition-all group shadow-inner"><i data-lucide="eye" class="w-12 h-12 text-slate-500 group-hover:text-blue-400 transition-colors"></i><span class="text-white font-bold text-lg sm:text-xl tracking-wide">Tap to Reveal Role</span></button>';
        } else if (isJester) {
            cardContent = '<div class="p-6 sm:p-8 rounded-3xl border bg-fuchsia-950/60 border-fuchsia-500/40 mb-6 text-center">'
                + '<i data-lucide="smile" class="w-10 h-10 text-fuchsia-400 mx-auto mb-2 animate-pulse"></i>'
                + '<h3 class="text-xl sm:text-2xl font-black text-fuchsia-400 uppercase tracking-widest">The Jester</h3>'
                + '<div class="h-px w-16 bg-fuchsia-500/30 mx-auto my-4"></div>'
                + '<div class="text-lg sm:text-xl font-bold text-white leading-tight">Act suspicious and get voted out to win the round!</div>'
                + (state.settings.imposterHints && state.game.hint ? '<div class="mt-5 bg-fuchsia-500/10 border border-fuchsia-500/20 rounded-xl p-3"><p class="text-[10px] uppercase tracking-widest text-fuchsia-300/80 font-bold mb-0.5">Vague Hint</p><p class="text-lg font-bold text-white">' + esc(state.game.hint) + '</p></div>' : '')
                + '</div>'
                + '<button onclick="nextReveal()" class="w-full py-4 bg-white hover:bg-slate-200 active:scale-95 text-slate-900 rounded-xl font-bold text-lg shadow-xl transition-all">Hide &amp; Next</button>';
        } else if (isImposter) {
            cardContent = '<div class="p-6 sm:p-8 rounded-3xl border bg-red-950/60 border-red-500/40 mb-6 text-center">'
                + '<i data-lucide="' + (state.settings.blindImposter ? 'eye-off' : 'alert-circle') + '" class="w-10 h-10 text-red-500 mx-auto mb-2' + (state.settings.blindImposter ? ' animate-pulse' : '') + '"></i>'
                + '<h3 class="text-xl sm:text-2xl font-black text-red-400 uppercase tracking-widest">Imposter</h3>'
                + '<div class="h-px w-16 bg-red-500/30 mx-auto my-4"></div>'
                + (state.settings.blindImposter
                    ? '<div class="text-lg sm:text-xl font-bold text-white leading-tight">You don\'t know the category. Survive!</div>'
                    : '<div><p class="text-red-200/70 text-xs sm:text-sm font-medium">Blend in. The category is:</p><div class="text-2xl sm:text-3xl font-black text-white mt-2 break-words">' + esc(state.game.category) + '</div></div>')
                + (state.settings.imposterHints && state.game.hint ? '<div class="mt-5 bg-red-500/10 border border-red-500/20 rounded-xl p-3"><p class="text-[10px] uppercase tracking-widest text-red-300/80 font-bold mb-0.5">Vague Hint</p><p class="text-lg font-bold text-white">' + esc(state.game.hint) + '</p></div>' : '')
                + '</div>'
                + '<button onclick="nextReveal()" class="w-full py-4 bg-white hover:bg-slate-200 active:scale-95 text-slate-900 rounded-xl font-bold text-lg shadow-xl transition-all">Hide &amp; Next</button>';
        } else {
            cardContent = '<div class="p-6 sm:p-8 rounded-3xl border bg-blue-950/60 border-blue-500/40 mb-6 text-center">'
                + '<i data-lucide="search" class="w-10 h-10 text-blue-400 mx-auto mb-2"></i>'
                + '<h3 class="text-base sm:text-lg font-bold text-blue-200/70 uppercase tracking-widest">Secret Word</h3>'
                + '<div class="h-px w-16 bg-blue-500/30 mx-auto my-4"></div>'
                + '<div class="text-3xl sm:text-4xl font-black text-white tracking-wide break-words">' + esc(state.game.secretWord) + '</div>'
                + '</div>'
                + '<button onclick="nextReveal()" class="w-full py-4 bg-white hover:bg-slate-200 active:scale-95 text-slate-900 rounded-xl font-bold text-lg shadow-xl transition-all">Hide &amp; Next</button>';
        }

        return '<div class="flex-1 flex flex-col items-center justify-center p-2 sm:p-4">'
            + '<div class="w-full max-w-sm glass-card rounded-[2rem] p-6 sm:p-8 text-center shadow-2xl border border-slate-700/50 relative">'
            + '<div class="absolute -top-20 -right-20 w-48 h-48 bg-blue-500 rounded-full blur-[60px] opacity-10 pointer-events-none"></div>'
            + '<h2 class="text-base sm:text-lg text-blue-200/60 font-semibold mb-2 uppercase tracking-wide">Pass phone to</h2>'
            + '<h1 class="text-3xl sm:text-4xl font-black text-white mb-8 sm:mb-10 truncate">' + esc(displayName) + '</h1>'
            + cardContent + '</div></div>';
    }

    // ─── Playing ──────────────────────────────────────────────────────────────────
    function renderPlaying() {
        var totalTurns = state.game.shuffledPlayers.length * state.settings.clueRounds;

        if (state.game.activeTurnIndex >= totalTurns) {
            return topBar('Give Clues', false)
                + '<div class="flex-1 flex flex-col justify-center items-center text-center space-y-6 pb-4">'
                + '<div class="w-24 h-24 bg-red-500/20 rounded-full flex items-center justify-center border border-red-500/30"><i data-lucide="swords" class="w-12 h-12 text-red-400"></i></div>'
                + '<h2 class="text-4xl font-black text-white">All Clues Given</h2>'
                + '<p class="text-slate-300 px-4 text-lg">It\'s time to interrogate and vote.</p></div>'
                + '<div class="shrink-0 mt-2"><button onclick="setScreen(\'voting\')" class="w-full py-5 bg-gradient-to-r from-red-600 to-rose-600 hover:from-red-500 hover:to-rose-500 active:scale-95 text-white rounded-2xl font-black text-xl shadow-[0_0_20px_rgba(225,29,72,0.3)] transition-all">Start Voting</button></div>';
        }

        var activePlayer = state.game.shuffledPlayers[state.game.activeTurnIndex % state.game.shuffledPlayers.length];
        var currentRound = Math.floor(state.game.activeTurnIndex / state.game.shuffledPlayers.length) + 1;
        var timerOn      = state.settings.timeLimit > 0;
        var timerWarning = timerOn && state.game.timeLeft <= 3 && state.game.timeLeft > 0;
        var timerFailed  = timerOn && state.game.timeLeft === 0;
        var borderClass  = timerWarning ? 'border-amber-500/50 bg-amber-950/30' : timerFailed ? 'border-red-500/50 bg-red-950/40' : 'border-blue-500/30';
        var nameColor    = timerWarning ? 'text-amber-400' : timerFailed ? 'text-red-400' : 'text-white';

        var timerHTML = '';
        if (timerOn) {
            var tc = timerWarning ? 'border-amber-500/50 text-amber-400 bg-amber-500/10' : timerFailed ? 'border-red-500/50 text-red-500 bg-red-500/10' : 'border-blue-500/30 text-blue-300 bg-black/20';
            timerHTML = '<div class="flex flex-col items-center justify-center mb-6">'
                + '<div id="turn-timer-circle" class="w-24 h-24 rounded-full border-4 flex items-center justify-center shadow-inner transition-colors duration-300 ' + tc + (timerWarning ? ' animate-pulse-fast' : '') + '">'
                + '<span id="turn-timer-text" class="text-4xl font-black font-mono">' + state.game.timeLeft + '</span></div>'
                + (timerFailed ? '<span class="text-red-400 font-bold mt-3 text-sm">TIME\'S UP!</span>' : '')
                + '</div>';
        }

        var infoBar = state.game.activeWildcard
            ? '<div class="glass-card rounded-2xl p-4 text-center shrink-0 border border-emerald-500/30 bg-emerald-950/20 flex flex-col items-center"><div class="flex items-center space-x-2 mb-1"><i data-lucide="sparkles" class="w-4 h-4 text-emerald-400 animate-pulse"></i><span class="text-[10px] text-emerald-400 font-bold uppercase tracking-widest">Wildcard Rule</span></div><span class="text-white font-medium text-sm px-2">' + esc(state.game.activeWildcard) + '</span></div>'
            : '<div class="glass-card rounded-2xl p-4 shrink-0 border border-slate-700/50 flex justify-between items-center bg-indigo-900/10"><div class="text-left"><span class="text-xs text-indigo-300 font-bold uppercase tracking-widest block">Phase</span><span class="text-white font-medium text-sm">Say 1 word</span></div><div class="text-right"><span class="text-xs text-indigo-300 font-bold uppercase tracking-widest block">Round</span><span class="text-white font-medium text-sm">' + currentRound + ' of ' + state.settings.clueRounds + '</span></div></div>';

        return topBar('Give Clues', false)
            + '<div class="flex-1 flex flex-col min-h-0 space-y-4 pb-4">' + infoBar
            + '<div id="playing-dashboard" class="glass-card rounded-[2rem] p-6 sm:p-8 text-center border relative overflow-hidden flex-1 flex flex-col justify-center shadow-xl transition-colors duration-300 ' + borderClass + '">'
            + '<div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-blue-500/30 to-transparent"></div>'
            + '<div class="mb-4 text-slate-400 font-medium uppercase tracking-widest text-sm">Speaking Now</div>'
            + '<h2 class="text-4xl sm:text-5xl font-black tracking-tight mb-8 truncate ' + nameColor + '">' + esc(activePlayer.name.trim() || 'Player') + '</h2>'
            + timerHTML + '</div></div>'
            + '<div class="shrink-0 mt-2"><button onclick="advanceTurn()" class="w-full py-5 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 active:scale-95 text-white rounded-2xl font-black text-xl shadow-[0_0_20px_rgba(79,70,229,0.3)] transition-all">Next Player</button></div>';
    }

    // ─── Voting ───────────────────────────────────────────────────────────────────
    function renderVoting() {
        var html = topBar('Vote Imposter', false);
        html += '<div class="text-center mb-4 bg-blue-900/10 py-3 rounded-2xl border border-blue-500/10 shrink-0"><p class="text-blue-200/80 font-medium text-sm sm:text-base">Discuss. Who will you execute?</p></div>';
        html += '<div class="space-y-3 flex-1 overflow-y-auto pb-4 custom-scrollbar">';
        state.players.forEach(function(p) {
            html += '<button onclick="openVoteModal(' + p.id + ')" class="w-full flex items-center justify-between p-4 sm:p-5 glass-card hover:bg-white/10 active:scale-95 rounded-2xl transition-all border border-slate-700/50 group">'
                + '<span class="text-white font-bold text-lg sm:text-xl group-hover:text-blue-200 truncate">' + esc(p.name.trim() || 'Player') + '</span>'
                + '<div class="w-6 h-6 rounded-full border-2 border-slate-500 group-hover:border-blue-400 transition-colors shrink-0"></div></button>';
        });
        html += '</div>';
        return html;
    }

    // ─── Result ───────────────────────────────────────────────────────────────────
    function renderResult() {
        var winner      = state.game.winner;
        var imposterIds = state.game.imposterIds;
        var jesterId    = state.game.jesterId;
        var lastVotedId = state.game.lastVotedId;
        var earnings    = state.game.earnings;
        var category    = state.game.category;
        var secretWord  = state.game.secretWord;

        var imposters     = state.players.filter(function(p) { return imposterIds.indexOf(p.id) !== -1; });
        var imposterNames = imposters.map(function(p) { return esc(p.name.trim() || 'Player'); }).join(' &amp; ');
        var suspect       = state.players.find(function(p) { return p.id === lastVotedId; });
        var suspectName   = suspect ? esc(suspect.name.trim() || 'Player') : 'Someone';

        // Header values — plain variables, no template expressions in class strings
        var glowColor, iconName, iconColor, titleText, titleColor, subText;
        if (winner === 'jester') {
            glowColor = 'fuchsia'; iconName = 'smile';        iconColor = 'text-fuchsia-400';
            titleText = 'Jester Wins!';      titleColor = 'text-fuchsia-400';
            subText   = 'You fools executed <span class="text-white font-bold">' + suspectName + '</span>!';
        } else if (winner === 'players') {
            glowColor = 'blue';    iconName = 'trophy';       iconColor = 'text-blue-400';
            titleText = 'Imposter Caught!';  titleColor = 'text-blue-400';
            subText   = 'The crew executed <span class="text-white font-bold">' + suspectName + '</span>.';
        } else {
            glowColor = 'red';     iconName = 'alert-circle'; iconColor = 'text-red-500';
            titleText = 'Imposter Escaped!'; titleColor = 'text-red-500';
            subText   = 'You executed <span class="text-white font-bold">' + suspectName + '</span> (Innocent).<br>'
                      + '<span class="text-sm font-bold text-red-400 mt-1 inline-block">The Imposter was <span class="text-white text-lg">' + imposterNames + '</span></span>';
        }

        var glowBg     = 'bg-' + glowColor + '-500';
        var cardBg     = 'bg-' + glowColor + '-500/20';
        var cardBorder = 'border-' + glowColor + '-500/50';

        // Earnings rows
        var sortedByEarnings = state.players.slice().sort(function(a,b) { return (earnings[b.id]||0) - (earnings[a.id]||0); });
        var earningsRows = sortedByEarnings.map(function(p) {
            var earned = earnings[p.id] || 0;
            var cc     = earned > 0 ? 'text-emerald-400' : earned < 0 ? 'text-red-400' : 'text-slate-400';
            var sign   = earned > 0 ? '+' : '';
            var roleTag = '';
            if (imposterIds.indexOf(p.id) !== -1) roleTag = '<span class="text-[10px] ml-2 px-1.5 py-0.5 rounded bg-red-500/20 text-red-400 border border-red-500/30 uppercase font-bold">Imposter</span>';
            else if (jesterId === p.id)            roleTag = '<span class="text-[10px] ml-2 px-1.5 py-0.5 rounded bg-fuchsia-500/20 text-fuchsia-400 border border-fuchsia-500/30 uppercase font-bold">Jester</span>';
            return '<div class="flex justify-between items-center bg-black/20 rounded-lg p-2.5 px-3">'
                + '<div class="flex items-center flex-wrap"><span class="text-white text-sm font-medium">' + esc(p.name) + '</span>' + roleTag + '</div>'
                + '<span class="' + cc + ' font-black text-sm w-8 text-right">' + sign + earned + '</span></div>';
        }).join('');

        // Leaderboard rows
        var leaderboardRows = state.players.slice().sort(function(a,b) { return b.score - a.score; }).map(function(p, i) {
            return '<div class="flex justify-between items-center bg-black/20 rounded-lg p-2.5 px-3">'
                + '<div class="flex items-center space-x-2"><span class="text-slate-500 text-xs font-bold w-4">' + (i+1) + '.</span><span class="text-white text-sm font-medium">' + esc(p.name) + '</span></div>'
                + '<span class="' + (p.score < 0 ? 'text-red-400' : 'text-blue-400') + ' font-bold text-sm">' + p.score + ' pt' + (Math.abs(p.score) !== 1 ? 's' : '') + '</span></div>';
        }).join('');

        var champion       = state.players.find(function(p) { return p.score >= state.settings.scoreLimit; });
        var primaryAction  = champion ? 'showSeriesWinner()' : 'playNextRound()';
        var primaryText    = champion ? 'View Champion' : 'Next Round';
        var primaryClass   = champion
            ? 'bg-gradient-to-r from-amber-500 to-orange-500 hover:from-amber-400 hover:to-orange-400 text-white shadow-[0_0_15px_rgba(245,158,11,0.4)]'
            : 'bg-white text-slate-900 hover:bg-slate-200';

        var html = '<div class="flex-1 overflow-y-auto custom-scrollbar flex flex-col items-center py-4 space-y-6 relative z-10">';

        // Target badge
        html += '<div class="absolute top-0 right-0 glass-card px-3 py-1.5 rounded-full border border-slate-700/50 flex space-x-2 items-center"><i data-lucide="list-ordered" class="w-4 h-4 text-slate-400"></i><span class="text-xs font-bold text-slate-300">Target: ' + state.settings.scoreLimit + ' Wins</span></div>';

        // Header
        html += '<div class="space-y-4 text-center pt-8 w-full max-w-sm">'
            + '<div class="inline-block relative">'
            + '<div class="absolute inset-0 blur-[50px] opacity-40 rounded-full ' + glowBg + '"></div>'
            + '<div class="relative p-6 sm:p-8 rounded-full ' + cardBg + ' ' + cardBorder + ' border-2">'
            + '<i data-lucide="' + iconName + '" class="w-16 h-16 sm:w-20 sm:h-20 ' + iconColor + '"></i></div></div>'
            + '<div><h1 class="text-4xl sm:text-5xl font-black uppercase tracking-tight mb-2 ' + titleColor + '">' + titleText + '</h1>'
            + '<p class="text-base sm:text-lg mt-2 font-medium text-slate-200">' + subText + '</p></div></div>';

        // Round points
        html += '<div class="w-full max-w-sm glass-card rounded-2xl p-4 border border-slate-700/50 shrink-0">'
            + '<p class="text-xs text-slate-400 font-bold uppercase tracking-widest mb-3">Round Points</p>'
            + '<div class="space-y-1.5">' + earningsRows + '</div></div>';

        // ── Category + Secret Word card — NO overflow-hidden, has shrink-0 ──
        var revealOpacity = winner === 'jester' ? ' opacity-70' : '';
        html += '<div class="glass-card rounded-3xl p-6 sm:p-8 w-full max-w-sm border border-slate-700/50 shadow-2xl shrink-0' + revealOpacity + '">'
            + '<div class="text-center">'
            + '<p class="text-blue-300 text-[10px] sm:text-xs uppercase tracking-widest font-bold mb-2">Category</p>'
            + '<p class="text-white text-lg sm:text-xl font-medium">' + esc(category) + '</p>'
            + '</div>'
            + '<div class="h-px bg-slate-800 w-full my-4"></div>'
            + '<div class="text-center">'
            + '<p class="text-blue-300 text-[10px] sm:text-xs uppercase tracking-widest font-bold mb-2">Secret Word</p>'
            + '<p class="text-white text-2xl sm:text-3xl font-black tracking-wide">' + esc(secretWord) + '</p>'
            + '</div></div>';

        // Punishment
        if (state.settings.punishments && state.game.currentPunishment && state.game.punishedPlayer) {
            html += '<div class="glass-card rounded-2xl p-4 border border-orange-500/30 bg-orange-950/20 w-full max-w-sm shrink-0">'
                + '<div class="flex items-center space-x-2 justify-center mb-2"><i data-lucide="flame" class="w-5 h-5 text-orange-400"></i><span class="text-orange-300 font-bold uppercase text-xs tracking-widest">Punishment Time</span></div>'
                + '<p class="text-white text-center font-medium text-sm px-2"><span class="text-orange-400 font-bold">' + esc(state.game.punishedPlayer) + '</span>: ' + esc(state.game.currentPunishment) + '</p></div>';
        }

        // Leaderboard
        html += '<div class="w-full max-w-sm glass-card rounded-2xl p-4 border border-slate-700/50 shrink-0">'
            + '<p class="text-xs text-slate-400 font-bold uppercase tracking-widest mb-3">Total Leaderboard</p>'
            + '<div class="space-y-1.5">' + leaderboardRows + '</div></div>';

        html += '</div>';

        // Bottom buttons
        html += '<div class="shrink-0 mt-4 flex w-full max-w-sm mx-auto space-x-3">'
            + '<button onclick="setScreen(\'setup\')" class="flex-1 py-4 glass-card hover:bg-white/10 active:scale-95 text-white rounded-2xl font-bold transition-all">Setup</button>'
            + '<button onclick="' + primaryAction + '" class="flex-[2] py-4 ' + primaryClass + ' active:scale-95 rounded-2xl font-black text-lg shadow-xl transition-all">' + primaryText + '</button>'
            + '</div>';

        return html;
    }

    // ─── Actions ──────────────────────────────────────────────────────────────────
    function setScreen(name) { state.screen = name; render(); }
    function goToHome()       { setScreen('home'); }
    function goToSetup()      { setScreen('setup'); }
    function goToCategories() { setScreen('categories'); }

    function addPlayer() {
        if (state.players.length < 12) {
            state.players.push({ id: Date.now(), name: 'Player ' + (state.players.length + 1), score: 0 });
            render();
        }
    }

    function removePlayer(id) {
        if (state.players.length > 3) {
            state.players = state.players.filter(function(p) { return p.id !== id; });
            if (state.players.length < 5) state.settings.jesterRole = false;
            render();
        }
    }

    function updatePlayerName(id, name) {
        var p = state.players.find(function(p) { return p.id === id; });
        if (p) p.name = name;
    }

    function updateImposterCount(delta) {
        var next = state.imposterCount + delta;
        var max  = Math.max(1, state.players.length - 2);
        if (next >= 1 && next <= max) { state.imposterCount = next; render(); }
    }

    function updateSetting(key, val) { state.settings[key] = val; render(); }
    function toggleSetting(key)      { state.settings[key] = !state.settings[key]; render(); }

    function handleCategoryClick(el) {
        var name = el.dataset.catname;
        if (!name) return;
        var idx = state.selectedCategories.indexOf(name);
        if (idx === -1) state.selectedCategories.push(name);
        else state.selectedCategories.splice(idx, 1);
        render();
    }

    function handleEditClick(btn, event) {
        event.stopPropagation();
        var id  = Number(btn.dataset.editid);
        var cat = state.customCategories.find(function(c) { return c.id === id; });
        if (!cat) return;
        var wordsText = cat.wordList.map(function(w, i) {
            var hint = cat.hintList && cat.hintList[i];
            return hint ? w + ' (' + hint + ')' : w;
        }).join(', ');
        state.customForm = { id: cat.id, name: cat.name, wordsText: wordsText, error: '' };
        setScreen('createCustom');
    }

    function clearCategorySelection() { state.selectedCategories = []; render(); }

    function startGameFromSelection() {
        if (state.selectedCategories.length === 0) return;
        var pick = state.selectedCategories[Math.floor(Math.random() * state.selectedCategories.length)];
        startGame(pick);
    }

    function openCreateCustom() {
        state.customForm = { id: null, name: '', wordsText: '', error: '' };
        setScreen('createCustom');
    }

    function updateCustomForm(field, value) {
        state.customForm[field] = value;
        state.customForm.error = '';
    }

    function saveCustomCategory() {
        var name = state.customForm.name.trim();
        if (!name) { state.customForm.error = 'Category name cannot be empty.'; return render(); }
        var isDupStandard = Object.keys(WORD_DATABASE).some(function(n) { return n.toLowerCase() === name.toLowerCase(); });
        var isDupCustom   = state.customCategories.some(function(c) { return c.name.toLowerCase() === name.toLowerCase() && c.id !== state.customForm.id; });
        if (isDupStandard || isDupCustom) { state.customForm.error = 'A category with this name already exists.'; return render(); }
        var tokens = state.customForm.wordsText.split(/[,;\n]+/).map(function(t) { return t.trim(); }).filter(function(t) { return t.length > 0; }).map(parseWordToken);
        if (tokens.length < 3) { state.customForm.error = 'Please enter at least 3 valid words.'; return render(); }
        var wordList = tokens.map(function(t) { return t.word; });
        var hintList = tokens.map(function(t) { return t.hint; });
        var entry = { id: state.customForm.id || Date.now(), name: name, words: wordList.length, type: 'custom', wordList: wordList, hintList: hintList };
        if (state.customForm.id) {
            var idx = state.customCategories.findIndex(function(c) { return c.id === state.customForm.id; });
            if (idx !== -1) state.customCategories[idx] = entry;
        } else {
            state.customCategories.push(entry);
        }
        saveCategoriesToStorage();
        state.customForm = { id: null, name: '', wordsText: '', error: '' };
        setScreen('categories');
    }

    function openDeleteModal()  { getEl('delete-modal').classList.remove('hidden'); getEl('delete-modal').classList.add('flex'); }
    function closeDeleteModal() { getEl('delete-modal').classList.add('hidden');    getEl('delete-modal').classList.remove('flex'); }

    function confirmDeleteCategory() {
        if (!state.customForm.id) return;
        var catName = (state.customCategories.find(function(c) { return c.id === state.customForm.id; }) || {}).name;
        state.customCategories = state.customCategories.filter(function(c) { return c.id !== state.customForm.id; });
        if (catName) state.selectedCategories = state.selectedCategories.filter(function(n) { return n !== catName; });
        saveCategoriesToStorage();
        closeDeleteModal();
        state.customForm = { id: null, name: '', wordsText: '', error: '' };
        setScreen('categories');
    }

    function startGame(categoryName) {
        var wordList, hintList;
        if (WORD_DATABASE[categoryName]) {
            wordList = WORD_DATABASE[categoryName];
            hintList = null;
        } else {
            var custom = state.customCategories.find(function(c) { return c.name === categoryName; });
            if (!custom || !custom.wordList.length) return;
            wordList = custom.wordList;
            hintList = custom.hintList || null;
        }
        var idx        = Math.floor(Math.random() * wordList.length);
        var secretWord = wordList[idx];
        var hint = hintList
            ? (hintList[idx] || GENERIC_HINTS[Math.floor(Math.random() * GENERIC_HINTS.length)])
            : (HINT_DATABASE[secretWord] || GENERIC_HINTS[Math.floor(Math.random() * GENERIC_HINTS.length)]);

        var rolePool    = shuffle(state.players);
        var imposterIds = rolePool.slice(0, state.imposterCount).map(function(p) { return p.id; });
        var jesterId    = null;
        if (state.settings.jesterRole && state.players.length >= 5) {
            var nonImposters = rolePool.filter(function(p) { return imposterIds.indexOf(p.id) === -1; });
            if (nonImposters.length > 0) jesterId = nonImposters[0].id;
        }
        var activeWildcard = state.settings.wildcardRounds ? WILDCARDS[Math.floor(Math.random() * WILDCARDS.length)] : null;

        state.game = {
            category: categoryName,
            secretWord: secretWord,
            hint: hint,
            imposterIds: imposterIds,
            jesterId: jesterId,
            activeWildcard: activeWildcard,
            currentPlayerIndex: 0,
            roleRevealed: false,
            winner: null,
            shuffledPlayers: shuffle(state.players),
            activeTurnIndex: 0,
            timeLeft: state.settings.timeLimit,
            currentPunishment: '',
            punishedPlayer: null,
            lastVotedId: null,
            earnings: {}
        };
        setScreen('reveal');
    }

    function revealRole()  { state.game.roleRevealed = true; render(); }

    function nextReveal() {
        if (state.game.currentPlayerIndex < state.players.length - 1) {
            state.game.currentPlayerIndex++;
            state.game.roleRevealed = false;
            render();
        } else {
            setScreen('playing');
        }
    }

    function advanceTurn() {
        state.game.activeTurnIndex++;
        state.game.timeLeft = state.settings.timeLimit;
        render();
    }

    function openVoteModal(playerId) {
        state.pendingVoteId = playerId;
        var p = state.players.find(function(p) { return p.id === playerId; });
        getEl('vote-target-name').innerText = p ? p.name : 'Player';
        getEl('confirm-vote-btn').onclick = confirmVote;
        getEl('vote-modal').classList.remove('hidden');
        getEl('vote-modal').classList.add('flex');
    }
    function closeVoteModal() {
        getEl('vote-modal').classList.add('hidden');
        getEl('vote-modal').classList.remove('flex');
    }

    function confirmVote() {
        var suspectId = state.pendingVoteId;
        closeVoteModal();
        state.pendingVoteId    = null;
        state.game.lastVotedId = suspectId;
        state.game.earnings    = {};

        if (state.game.jesterId === suspectId) {
            state.game.winner = 'jester';
            state.players.forEach(function(p) {
                var pts = p.id === suspectId ? 2 : 0;
                p.score += pts; state.game.earnings[p.id] = pts;
            });
        } else if (state.game.imposterIds.indexOf(suspectId) !== -1) {
            state.game.winner = 'players';
            state.players.forEach(function(p) {
                var pts = 0;
                if (state.game.imposterIds.indexOf(p.id) !== -1) pts = -1;
                else if (p.id !== state.game.jesterId)            pts = 1;
                p.score += pts; state.game.earnings[p.id] = pts;
            });
        } else {
            state.game.winner = 'imposter';
            state.players.forEach(function(p) {
                var pts = 0;
                if (state.game.imposterIds.indexOf(p.id) !== -1) pts = 2;
                else if (p.id === suspectId)                      pts = -1;
                p.score += pts; state.game.earnings[p.id] = pts;
            });
        }

        if (state.settings.punishments) {
            var loserPool = [];
            if      (state.game.winner === 'jester')  loserPool = state.players.filter(function(p) { return p.id !== state.game.jesterId && state.game.imposterIds.indexOf(p.id) === -1; });
            else if (state.game.winner === 'players') loserPool = state.players.filter(function(p) { return state.game.imposterIds.indexOf(p.id) !== -1; });
            else                                      loserPool = state.players.filter(function(p) { return state.game.imposterIds.indexOf(p.id) === -1 && p.id !== state.game.jesterId; });
            if (!loserPool.length) loserPool = state.players;
            var punished = loserPool[Math.floor(Math.random() * loserPool.length)];
            state.game.currentPunishment = PUNISHMENTS[Math.floor(Math.random() * PUNISHMENTS.length)];
            state.game.punishedPlayer    = punished.name.trim() || 'Someone';
        }
        setScreen('result');
    }

    function showSeriesWinner() {
        var champion = state.players.find(function(p) { return p.score >= state.settings.scoreLimit; });
        if (!champion) return;
        getEl('champion-name').innerText = champion.name;
        getEl('winner-modal').classList.remove('hidden');
        getEl('winner-modal').classList.add('flex');
        confettiEffect();
    }
    function playNextRound() { setScreen('categories'); }
    function resetSeries() {
        getEl('winner-modal').classList.add('hidden');
        getEl('winner-modal').classList.remove('flex');
        state.players.forEach(function(p) { p.score = 0; });
        setScreen('setup');
    }

    function manageTimer() {
        if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
        if (state.screen !== 'playing' || state.settings.timeLimit <= 0) return;
        var totalTurns = state.game.shuffledPlayers.length * state.settings.clueRounds;
        if (state.game.activeTurnIndex >= totalTurns || state.game.timeLeft <= 0) return;
        timerInterval = setInterval(function() {
            if (state.game.timeLeft > 0) { state.game.timeLeft--; updateTimerUI(); }
            if (state.game.timeLeft <= 0) { clearInterval(timerInterval); timerInterval = null; render(); }
        }, 1000);
    }

    function updateTimerUI() {
        var textEl      = getEl('turn-timer-text');
        var circleEl    = getEl('turn-timer-circle');
        var dashboardEl = getEl('playing-dashboard');
        if (!textEl || !circleEl || !dashboardEl) return;
        var tl      = state.game.timeLeft;
        var warning = tl <= 3 && tl > 0;
        var failed  = tl === 0;
        textEl.innerText     = tl;
        circleEl.className   = 'w-24 h-24 rounded-full border-4 flex items-center justify-center shadow-inner transition-colors duration-300 '
            + (warning ? 'border-amber-500/50 text-amber-400 bg-amber-500/10 animate-pulse-fast' : failed ? 'border-red-500/50 text-red-500 bg-red-500/10' : 'border-blue-500/30 text-blue-300 bg-black/20');
        dashboardEl.className = 'glass-card rounded-[2rem] p-6 sm:p-8 text-center border relative overflow-hidden flex-1 flex flex-col justify-center shadow-xl transition-colors duration-300 '
            + (warning ? 'border-amber-500/50 bg-amber-950/30' : failed ? 'border-red-500/50 bg-red-950/40' : 'border-blue-500/30');
    }

    function confettiEffect() {
        var modal  = getEl('winner-modal');
        var colors = ['#f59e0b','#3b82f6','#ef4444','#10b981','#a855f7','#d946ef'];
        for (var i = 0; i < 50; i++) {
            (function() {
                var el = document.createElement('div');
                Object.assign(el.style, { position:'absolute', width:'10px', height:'10px', backgroundColor: colors[Math.floor(Math.random()*colors.length)], left:'50%', top:'50%', opacity:'1', zIndex:'40', transform:'translate(-50%,-50%)', transition:'all 1s cubic-bezier(0.1,0.8,0.3,1)' });
                modal.appendChild(el);
                setTimeout(function() {
                    var a = Math.random() * Math.PI * 2;
                    var v = 100 + Math.random() * 200;
                    el.style.transform = 'translate(calc(-50% + ' + (Math.cos(a)*v) + 'px), calc(-50% + ' + (Math.sin(a)*v) + 'px)) rotate(' + (Math.random()*720) + 'deg)';
                    el.style.opacity = '0';
                }, 50);
                setTimeout(function() { el.remove(); }, 1050);
            })();
        }
    }

    window.onload = function() { loadCategoriesFromStorage(); render(); };
    </script>
</body>
</html>
